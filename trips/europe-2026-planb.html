<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loading trip...</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1a2e;
    --cream: #faf8f3;
    --warm: #f5efe6;
    --gold: #c9a84c;
    --gold-light: #e8d5a3;
    --rust: #b85c38;
    --sage: #6b8f71;
    --slate: #4a5568;
    --border: #e2d9cc;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--ink); font-size: 15px; line-height: 1.7; }

  /* HERO */
  .hero { background: var(--ink); color: var(--cream); padding: 80px 40px 60px; text-align: center; position: relative; overflow: hidden; }
  .hero::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse at 30% 50%, rgba(201,168,76,0.15) 0%, transparent 60%), radial-gradient(ellipse at 70% 30%, rgba(107,143,113,0.1) 0%, transparent 50%); }
  .hero-flags { font-size: 28px; letter-spacing: 6px; margin-bottom: 20px; position: relative; }
  .hero h1 { font-family: 'Playfair Display', serif; font-size: clamp(36px, 6vw, 72px); font-weight: 900; line-height: 1.1; margin-bottom: 16px; position: relative; }
  .hero h1 em { font-style: italic; color: var(--gold-light); }
  .hero-sub { font-size: 15px; font-weight: 300; letter-spacing: 2px; text-transform: uppercase; color: rgba(250,248,243,0.6); margin-bottom: 40px; position: relative; }
  .hero-stats { display: flex; justify-content: center; gap: 40px; flex-wrap: wrap; position: relative; }
  .stat { text-align: center; }
  .stat-num { font-family: 'Playfair Display', serif; font-size: 36px; font-weight: 700; color: var(--gold-light); display: block; line-height: 1; }
  .stat-label { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: rgba(250,248,243,0.5); margin-top: 4px; }

  /* LAYOUT */
  .container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }
  .section-title { font-family: 'Playfair Display', serif; font-size: 11px; letter-spacing: 4px; text-transform: uppercase; color: var(--gold); margin-bottom: 24px; margin-top: 56px; display: flex; align-items: center; gap: 12px; }
  .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  /* BOOKING STRIP */
  .booking-strip { background: var(--ink); color: var(--cream); padding: 24px 40px; display: flex; gap: 32px; flex-wrap: wrap; justify-content: center; }
  .booking-item { display: flex; align-items: center; gap: 10px; font-size: 13px; }
  .booking-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--sage); flex-shrink: 0; }
  .booking-dot.pending { background: var(--gold); }
  .booking-ref { font-family: 'DM Sans', sans-serif; font-weight: 500; font-size: 12px; color: var(--gold-light); }

  /* ACCOMMODATION TABLE */
  .accom-table { width: 100%; border-collapse: collapse; min-width: 500px; }
  .accom-table th { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--slate); font-weight: 500; text-align: left; padding: 8px 12px; border-bottom: 2px solid var(--border); }
  .accom-table td { padding: 12px 12px; border-bottom: 1px solid var(--border); font-size: 13px; vertical-align: top; }
  .accom-table tr:hover td { background: var(--warm); }
  .accom-table .booked { color: var(--sage); font-weight: 500; font-size: 11px; }
  .accom-table .pending { color: var(--gold); font-weight: 500; font-size: 11px; }
  .accom-table .prop { font-weight: 500; }
  .accom-table .ref { font-size: 11px; color: var(--slate); }
  .stars { color: var(--gold); font-size: 11px; }

  /* TRIP MAPS */
  .trip-maps-grid { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 4px; }
  .trip-map-card { display: flex; align-items: center; gap: 14px; padding: 16px 20px; background: white; border: 1px solid var(--border); border-radius: 4px; text-decoration: none; color: inherit; flex: 1; min-width: 260px; transition: all 0.15s; }
  .trip-map-card:hover { background: var(--warm); border-color: var(--gold); box-shadow: 0 2px 12px rgba(201,168,76,0.15); }
  .trip-map-icon { font-size: 26px; flex-shrink: 0; }
  .trip-map-label { font-weight: 600; font-size: 14px; line-height: 1.3; }
  .trip-map-desc { font-size: 11px; color: var(--slate); margin-top: 2px; letter-spacing: 0.3px; }
  .trip-map-arrow { font-size: 16px; color: var(--gold); margin-left: auto; flex-shrink: 0; }

  /* DAY CARDS */
  .days-grid { display: flex; flex-direction: column; gap: 2px; margin-top: 8px; }
  .day-card { border: 1px solid var(--border); border-radius: 4px; overflow: hidden; transition: box-shadow 0.2s; }
  .day-card:hover { box-shadow: 0 4px 20px rgba(26,26,46,0.08); }
  .day-header { display: flex; align-items: center; gap: 16px; padding: 16px 20px; cursor: pointer; background: white; user-select: none; }
  .day-header:hover { background: var(--warm); }
  .day-num { font-family: 'Playfair Display', serif; font-size: 24px; font-weight: 700; color: var(--gold); min-width: 36px; line-height: 1; }
  .day-info { flex: 1; }
  .day-title { font-weight: 500; font-size: 15px; line-height: 1.2; }
  .day-meta { font-size: 11px; color: var(--slate); letter-spacing: 1px; text-transform: uppercase; margin-top: 2px; }
  .day-flag { font-size: 20px; }
  .day-toggle { color: var(--slate); font-size: 18px; transition: transform 0.2s; min-width: 20px; text-align: center; }
  .day-card.open .day-toggle { transform: rotate(180deg); }
  .day-body { display: none; padding: 20px 20px 20px 72px; background: var(--warm); border-top: 1px solid var(--border); }
  .day-card.open .day-body { display: block; }
  .day-body ul { list-style: none; display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
  .day-body ul li { padding-left: 16px; position: relative; font-size: 14px; }
  .day-body ul li::before { content: '—'; position: absolute; left: 0; color: var(--gold); font-size: 12px; top: 2px; }
  .day-body ul li strong { font-weight: 500; }
  .day-map-link { display: inline-flex; align-items: center; gap: 6px; font-size: 11px; letter-spacing: 1px; text-transform: uppercase; color: var(--slate); text-decoration: none; border: 1px solid var(--border); padding: 5px 12px; border-radius: 2px; margin-bottom: 14px; margin-right: 6px; transition: all 0.15s; }
  .day-map-link:hover { background: var(--ink); color: var(--cream); border-color: var(--ink); }
  .sec-heading { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--slate); margin-bottom: 6px; margin-top: 14px; }
  .booking-tag { display: inline-flex; align-items: center; gap: 6px; font-size: 11px; background: rgba(107,143,113,0.12); color: var(--sage); border: 1px solid rgba(107,143,113,0.3); padding: 4px 10px; border-radius: 2px; margin-top: 8px; margin-right: 6px; }
  .laundry-tag { display: inline-flex; align-items: center; gap: 6px; font-size: 11px; background: rgba(201,168,76,0.1); color: #8a6e1a; border: 1px solid rgba(201,168,76,0.3); padding: 4px 10px; border-radius: 2px; margin-top: 6px; margin-right: 6px; }
  .alarm-tag { display: inline-flex; align-items: center; gap: 6px; font-size: 11px; background: rgba(184,92,56,0.1); color: var(--rust); border: 1px solid rgba(184,92,56,0.3); padding: 4px 10px; border-radius: 2px; margin-top: 6px; margin-right: 6px; }
  .birthday-banner { background: linear-gradient(135deg,rgba(201,168,76,0.15),rgba(184,92,56,0.1)); border: 1px solid rgba(201,168,76,0.4); border-radius: 4px; padding: 12px 16px; margin-bottom: 14px; font-size: 13px; }

  /* CHECKLIST */
  .checklist { display: flex; flex-direction: column; gap: 1px; margin-top: 8px; }
  .check-item { display: flex; align-items: center; gap: 14px; padding: 12px 16px; background: white; border: 1px solid var(--border); border-radius: 2px; font-size: 13px; }
  .check-icon { width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; flex-shrink: 0; }
  .check-icon.done    { background: var(--sage);  color: white; }
  .check-icon.urgent  { background: var(--rust);  color: white; }
  .check-icon.pending { background: var(--gold);  color: white; }
  .check-main { flex: 1; font-weight: 500; }
  .check-deadline { font-size: 11px; color: var(--slate); }
  .check-status-done    { font-size: 11px; color: var(--sage); font-weight: 500; }
  .check-status-pending { font-size: 11px; color: var(--gold); }
  .check-status-urgent  { font-size: 11px; color: var(--rust); font-weight: 600; }
  .check-link { font-size: 11px; color: var(--slate); text-decoration: none; }
  .check-link:hover { color: var(--ink); }

  /* BUDGET */
  .budget-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; margin-top: 8px; }
  .budget-item { background: white; border: 1px solid var(--border); border-radius: 4px; padding: 16px; }
  .budget-cat { font-size: 11px; letter-spacing: 1px; text-transform: uppercase; color: var(--slate); margin-bottom: 6px; }
  .budget-range { font-family: 'Playfair Display', serif; font-size: 20px; color: var(--ink); }
  .budget-total { grid-column: 1 / -1; background: var(--ink); color: var(--cream); border-color: var(--ink); }
  .budget-total .budget-cat { color: var(--gold-light); }
  .budget-total .budget-range { color: var(--gold-light); font-size: 28px; }

  /* CASH */
  .cash-table { width: 100%; border-collapse: collapse; margin-top: 8px; }
  .cash-table th { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--slate); font-weight: 500; text-align: left; padding: 8px 12px; border-bottom: 2px solid var(--border); }
  .cash-table td { padding: 10px 12px; border-bottom: 1px solid var(--border); font-size: 13px; }
  .cash-table tr:hover td { background: var(--warm); }
  .cash-amount { font-weight: 600; color: var(--ink); }

  /* REMINDERS */
  .reminders-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 12px; margin-top: 8px; }
  .reminder-item { background: white; border: 1px solid var(--border); border-radius: 4px; padding: 16px; font-size: 13px; display: flex; gap: 10px; align-items: flex-start; }
  .reminder-icon { font-size: 18px; flex-shrink: 0; margin-top: 1px; }

  /* SUMMARY / GLANCE TABLE — 8 columns */
  .glance-table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 1100px; }
  .glance-table th { background: var(--ink); color: var(--gold-light); text-transform: uppercase; letter-spacing: 0.5px; padding: 10px 12px; text-align: left; white-space: nowrap; font-size: 10px; }
  .glance-table td { padding: 9px 12px; border-bottom: 1px solid var(--border); vertical-align: top; }
  .glance-table tr:nth-child(odd) td  { background: var(--warm); }
  .glance-table tr:nth-child(even) td { background: white; }
  .glance-table tr:hover td { background: #f0f7f1; }
  .g-day  { font-family: 'Playfair Display', serif; font-weight: 700; color: var(--gold); white-space: nowrap; font-size: 15px; vertical-align: middle !important; }
  .g-date { white-space: nowrap; color: var(--slate); font-size: 11px; vertical-align: middle !important; }
  .g-from { font-size: 12px; white-space: nowrap; vertical-align: middle !important; }
  .g-stay { font-size: 12px; color: var(--slate); white-space: nowrap; vertical-align: middle !important; }
  .g-drive { text-align: center; font-size: 12px; white-space: nowrap; font-weight: 500; vertical-align: middle !important; }
  .g-time  { text-align: center; font-size: 11px; color: var(--slate); white-space: nowrap; vertical-align: middle !important; }
  .g-bookings { font-size: 11px; line-height: 1.9; min-width: 130px; white-space: normal; }
  .g-map { text-align: center; vertical-align: middle !important; white-space: nowrap; }
  .g-map a { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; color: var(--slate); text-decoration: none; border: 1px solid var(--border); padding: 4px 10px; border-radius: 2px; transition: all 0.15s; white-space: nowrap; }
  .g-map a:hover { background: var(--ink); color: var(--cream); border-color: var(--ink); }
  /* Highlight pills */
  .g-highlights { min-width: 220px; max-width: 340px; padding-top: 10px !important; padding-bottom: 10px !important; }
  .hl-pills { display: flex; flex-wrap: wrap; gap: 4px; }
  .hl-pill { display: inline-block; background: rgba(201,168,76,0.12); color: #6b5010; border: 1px solid rgba(201,168,76,0.3); border-radius: 20px; padding: 2px 9px; font-size: 10px; font-weight: 500; white-space: nowrap; letter-spacing: 0.2px; }
  .bk-done    { color: #27ae60; font-weight: 600; font-size: 11px; }
  .bk-pending { color: #e67e22; font-weight: 600; font-size: 11px; }

  /* FOOTER */
  footer { background: var(--ink); color: rgba(250,248,243,0.4); text-align: center; padding: 32px; margin-top: 80px; font-size: 12px; letter-spacing: 1px; }
  footer strong { color: var(--gold-light); }

  @media (max-width: 600px) {
    .hero { padding: 50px 20px 40px; }
    .hero-stats { gap: 24px; }
    .booking-strip { padding: 16px 20px; gap: 16px; }
    .day-body { padding: 16px; }
    .trip-map-card { min-width: 100%; }
  }
</style>
</head>
<body>

<nav style="background:#1a1a2e;padding:16px 40px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;">
  <a href="../index.html" style="font-family:'Playfair Display',serif;font-size:16px;color:#faf8f3;text-decoration:none;letter-spacing:0.5px;">← Rahul & <em style="color:#e8d5a3;font-style:italic;">Veena's</em> Travel Journal</a><span style="margin-left:12px;background:#c9a84c;color:#1a1a2e;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;padding:4px 10px;border-radius:2px;">PLAN B</span>
  <span id="nav-label" style="font-size:11px;letter-spacing:2px;text-transform:uppercase;color:rgba(250,248,243,0.4);"></span>
</nav>

<div id="app"></div>

<script>
// ─── DATA SOURCE ────────────────────────────────────────────────────────────
const DATA_FILE = '../data/europe-2026-planb.json';

// ─── HELPERS ────────────────────────────────────────────────────────────────
const h = (tag, attrs, ...children) => {
  const el = document.createElement(tag);
  if (attrs) Object.entries(attrs).forEach(([k,v]) => {
    if (k === 'class') el.className = v;
    else if (k === 'html') el.innerHTML = v;
    else if (k.startsWith('on')) el.addEventListener(k.slice(2), v);
    else el.setAttribute(k, v);
  });
  children.flat().forEach(c => c && el.appendChild(typeof c === 'string' ? document.createTextNode(c) : c));
  return el;
};
const div  = (cls, ...c) => h('div', {class: cls}, ...c);
const span = (cls, txt) => h('span', {class: cls, html: txt});
const p    = (cls, txt) => h('p', {class: cls, html: txt});

function tagEl(tag) {
  const cls = { booking: 'booking-tag', laundry: 'laundry-tag', alarm: 'alarm-tag' }[tag.type] || 'alarm-tag';
  return h('span', {class: cls, html: tag.text});
}

// ─── RENDER FUNCTIONS ───────────────────────────────────────────────────────
function renderHero(d) {
  const m = d.meta;
  document.title = `${m.title} — ${m.subtitle}`;
  document.getElementById('nav-label').textContent = m.flags.slice(1,4).join(' ') + ' · ' + m.departure.split(' ')[1] + '–' + m.return.split(' ')[1] + ' 2026';
  return h('div', {class: 'hero'},
    p('hero-flags', m.flags.join(' ')),
    h('h1', {html: m.title + '<br><em>' + m.subtitle + '</em>'}),
    p('hero-sub', m.tagline),
    div('hero-stats',
      ...[
        [m.days,'Days'],[m.countries,'Countries'],[m.travellers,'Travellers'],
        [m.departure,'Departure'],[m.return,'Return']
      ].map(([n,l]) => div('stat', h('span',{class:'stat-num'},String(n)), h('span',{class:'stat-label'},l)))
    )
  );
}

function renderStrip(d) {
  const strip = div('booking-strip');
  d.bookingStrip.forEach(item => {
    const dot = div('booking-dot' + (item.status === 'pending' ? ' pending' : ''));
    strip.appendChild(div('booking-item', dot, document.createTextNode(' ' + item.label + ' '), span('booking-ref', item.ref)));
  });
  return strip;
}

function renderFlights(d) {
  const wrap = div('', h('p', {class:'section-title'}, 'Flights'));
  const box = h('div', {style:'background:white;border:1px solid var(--border);border-radius:4px;padding:20px;display:flex;flex-direction:column;gap:12px;'});
  d.flights.forEach(f => {
    const row = h('div', {style:'display:flex;align-items:center;gap:14px;flex-wrap:wrap;'});
    row.appendChild(h('span', {style:'font-size:13px;color:var(--slate);min-width:80px'}, f.date));
    row.appendChild(h('span', {style:'font-weight:500'}, f.route));
    row.appendChild(h('span', {style:'font-size:12px;color:var(--slate)'}, f.detail));
    box.appendChild(row);
  });
  const footer = h('div', {style:'border-top:1px solid var(--border);padding-top:12px;display:flex;gap:20px;flex-wrap:wrap;'});
  footer.appendChild(h('span', {class:'booking-tag'}, '✓ Booked · ' + d.flightsRef.split('·')[0].trim()));
  footer.appendChild(h('span', {style:'font-size:12px;color:var(--slate);align-self:center', html: d.flightsRef.split('·').slice(1).join('·').trim()}));
  box.appendChild(footer);
  wrap.appendChild(box);
  return wrap;
}

function renderCars(d) {
  const wrap = div('', h('p', {class:'section-title'}, 'Car Rentals'));
  const box = h('div', {style:'background:white;border:1px solid var(--border);border-radius:4px;padding:20px;display:flex;flex-direction:column;gap:12px;'});
  d.cars.forEach(c => {
    const row = h('div', {style:'display:flex;align-items:center;gap:14px;flex-wrap:wrap;'});
    row.appendChild(h('span', {style:'font-size:13px;color:var(--slate);min-width:100px'}, c.country));
    row.appendChild(h('span', {style:'font-weight:500'}, c.vendor));
    row.appendChild(h('span', {style:'font-size:12px;color:var(--slate)', html: c.detail.replace(/\b(L5350959316|#42334482US1|\$289\.00|CHF 575\.92)\b/g, '<strong>$1</strong>')}));
    box.appendChild(row);
  });
  const footer = h('div', {style:'border-top:1px solid var(--border);padding-top:12px;'});
  footer.appendChild(h('span', {class:'booking-tag'}, '✓ ' + d.carsTotalNote));
  box.appendChild(footer);
  wrap.appendChild(box);
  return wrap;
}

// ── NEW: Full Route Maps ─────────────────────────────────────────────────────
function renderTripMaps(d) {
  if (!d.tripMaps || !d.tripMaps.length) return div('');
  const wrap = div('', h('p', {class:'section-title'}, 'Full Route Maps'));
  const grid = div('trip-maps-grid');
  d.tripMaps.forEach(m => {
    const card = h('a', {class:'trip-map-card', href: m.url, target:'_blank', rel:'noopener'});
    card.appendChild(h('div', {class:'trip-map-icon'}, '🗺️'));
    const info = div('');
    info.appendChild(h('div', {class:'trip-map-label'}, m.label));
    info.appendChild(h('div', {class:'trip-map-desc'}, m.description));
    card.appendChild(info);
    card.appendChild(h('div', {class:'trip-map-arrow'}, '↗'));
    grid.appendChild(card);
  });
  wrap.appendChild(grid);
  return wrap;
}

function renderAccommodation(d) {
  const wrap = div('', h('p', {class:'section-title'}, 'Accommodation'));
  const tableWrap = div('');
  tableWrap.style.overflowX = 'auto';
  const tbl = h('table', {class:'accom-table'});
  tbl.appendChild(h('thead', {}, h('tr', {},
    ...['Nights','Property','Dates','Ref','Status'].map(t => h('th',{},t))
  )));
  const tbody = h('tbody');
  d.accommodation.forEach(row => {
    const statusMap   = { booked:'✓ Booked', confirmed:'✓ Confirmed', pending:'⏳ Pending' };
    const statusClass = { booked:'booked', confirmed:'booked', pending:'pending' };
    tbody.appendChild(h('tr', {},
      h('td',{},row.nights),
      h('td',{}, h('span',{class:'prop'},row.property), h('br'), h('span',{class:'ref'},row.address)),
      h('td',{},row.dates),
      h('td',{}, h('span',{class:'ref', html: row.ref
        + (row.freeCancel ? ' <span style="color:var(--sage);font-size:10px">'+row.freeCancel+'</span>' : '')
        + (row.stars ? ' <span class="stars">'+row.stars+'★</span>' : '')})),
      h('td',{}, h('span',{class:statusClass[row.status]}, statusMap[row.status]))
    ));
  });
  tbl.appendChild(tbody);
  tableWrap.appendChild(tbl);
  wrap.appendChild(tableWrap);
  return wrap;
}

function renderDayCard(day, idx) {
  const card = div('day-card' + (idx === 0 ? ' open' : ''));
  const header = div('day-header');
  header.addEventListener('click', () => card.classList.toggle('open'));
  header.appendChild(div('day-num', day.dayLabel));
  const info = div('day-info');
  info.appendChild(div('day-title', day.title));
  info.appendChild(div('day-meta', day.meta));
  header.appendChild(info);
  header.appendChild(h('div', {class:'day-flag'}, day.flag));
  header.appendChild(div('day-toggle', '▾'));
  card.appendChild(header);

  const body = div('day-body');
  if (day.birthday) body.appendChild(h('div', {class:'birthday-banner', html: day.birthday}));

  if (day.mapLinks && day.mapLinks.length) {
    const mapRow = h('div', {style:'margin-bottom:12px;display:flex;flex-wrap:wrap;gap:6px;'});
    day.mapLinks.forEach(ml => mapRow.appendChild(
      h('a', {class:'day-map-link', href:ml.url, target:'_blank'}, '📍 ' + ml.label)
    ));
    body.appendChild(mapRow);
  }

  day.sections.forEach(sec => {
    if (sec.heading && day.sections.length > 1) body.appendChild(h('p',{class:'sec-heading'},sec.heading));
    const ul = h('ul');
    sec.items.forEach(item => ul.appendChild(h('li',{html:item})));
    body.appendChild(ul);
  });

  if (day.tags && day.tags.length) {
    const tagWrap = h('div', {style:'margin-top:10px;display:flex;flex-wrap:wrap;gap:6px;'});
    day.tags.forEach(t => tagWrap.appendChild(tagEl(t)));
    body.appendChild(tagWrap);
  }

  card.appendChild(body);
  return card;
}

// ── UPDATED: Trip at a Glance — 8 columns ───────────────────────────────────
function renderSummaryTable(d) {
  const wrap = div('');
  wrap.appendChild(h('p', {class:'section-title', style:'margin-top:0'}, 'Trip at a Glance'));
  const tableWrap = h('div', {style:'overflow-x:auto;margin-bottom:32px;'});
  const tbl = h('table', {class:'glance-table'});

  tbl.appendChild(h('thead', {}, h('tr', {},
    ...['Day','Date','Starting Place','Night Stay','Highlights','Drive','Drive Time','Bookings','Map']
      .map(t => h('th',{},t))
  )));

  const tbody = h('tbody');

  (d.glance || []).forEach(g => {
    const bkTd = h('td', {class:'g-bookings'});
    g.bookings.split(' · ').forEach(b => {
      const s = h('span', {style:'display:block'});
      s.className = b.startsWith('✓') ? 'bk-done' : 'bk-pending';
      s.textContent = b;
      bkTd.appendChild(s);
    });

    // Render highlights as pills
    const hlTd = h('td', {class:'g-highlights'});
    const pillWrap = div('hl-pills');
    g.highlights.split(' · ').forEach(place => {
      if (place.trim()) pillWrap.appendChild(h('span', {class:'hl-pill'}, place.trim()));
    });
    hlTd.appendChild(pillWrap);

    // Map link
    const mapTd = h('td', {class:'g-map'});
    if (g.mapUrl) {
      mapTd.appendChild(h('a', {href: g.mapUrl, target:'_blank', rel:'noopener'}, '📍 Map'));
    } else {
      mapTd.appendChild(h('span', {style:'color:var(--slate);font-size:11px'}, '—'));
    }

    tbody.appendChild(h('tr', {},
      h('td', {class:'g-day'},   g.day),
      h('td', {class:'g-date'},  g.date),
      h('td', {class:'g-from'},  g.from),
      h('td', {class:'g-stay'},  g.nightStay),
      hlTd,
      h('td', {class:'g-drive'}, g.drive),
      h('td', {class:'g-time'},  g.driveTime),
      bkTd,
      mapTd
    ));
  });

  tbl.appendChild(tbody);
  tableWrap.appendChild(tbl);
  wrap.appendChild(tableWrap);
  return wrap;
}

function renderChecklist(d) {
  const wrap = div('', h('p', {class:'section-title'}, 'Booking Checklist'));
  const list = div('checklist');
  d.checklist.forEach(item => {
    const iconClass = {done:'done',pending:'pending',urgent:'urgent'}[item.status]||'pending';
    const row = div('check-item',
      h('div',{class:'check-icon '+iconClass}, item.status==='done'?'✓':'!'),
      h('div',{class:'check-main'},item.label)
    );
    if (item.deadline) row.appendChild(h('div',{class:'check-deadline'},item.deadline));
    if (item.status==='done'&&item.ref)       row.appendChild(h('span',{class:'check-status-done'},item.ref));
    else if (item.status==='pending')          row.appendChild(h('span',{class:'check-status-pending'},'⏳ Pending'));
    else if (item.status==='urgent')           row.appendChild(h('span',{class:'check-status-urgent'},'⚠️ Action needed'));
    if (item.link) row.appendChild(h('a',{class:'check-link',href:item.link,target:'_blank'},' →'));
    list.appendChild(row);
  });
  wrap.appendChild(list);
  return wrap;
}

function renderBudget(d) {
  const wrap = div('', h('p', {class:'section-title'}, 'Budget'));
  const grid = div('budget-grid');
  d.budget.forEach(b => {
    const item = div('budget-item');
    item.appendChild(h('div',{class:'budget-cat'},b.cat));
    item.appendChild(h('div',{class:'budget-range'},b.amount));
    grid.appendChild(item);
  });
  const total = div('budget-item budget-total');
  total.appendChild(h('div',{class:'budget-cat'},'Confirmed so far · Total Estimated'));
  total.appendChild(h('div',{class:'budget-range'},d.budgetSummary.confirmed+' · '+d.budgetSummary.estimated));
  grid.appendChild(total);
  wrap.appendChild(grid);

  wrap.appendChild(h('p',{class:'section-title',style:'margin-top:32px'},'Accommodation Breakdown'));
  const tableWrap = h('div',{style:'overflow-x:auto'});
  const tbl = h('table',{class:'accom-table'});
  tbl.appendChild(h('thead',{},h('tr',{},h('th',{},'Property'),h('th',{},'Paid'))));
  const tbody = h('tbody');
  d.accommodationBreakdown.forEach(row =>
    tbody.appendChild(h('tr',{},h('td',{},row.property),h('td',{html:row.paid})))
  );
  tbody.appendChild(h('tr',{style:'background:var(--warm)'},
    h('td',{},h('strong',{},'Total')),h('td',{},h('strong',{},'~$2,888'))
  ));
  tbl.appendChild(tbody);
  tableWrap.appendChild(tbl);
  wrap.appendChild(tableWrap);
  return wrap;
}

function renderCash(d) {
  const wrap = div('', h('p', {class:'section-title'}, 'Cash & Currency Guide'));
  const tableWrap = h('div',{style:'overflow-x:auto'});
  const tbl = h('table',{class:'cash-table'});
  tbl.appendChild(h('thead',{},h('tr',{},...['Country','Currency','Days','Bring','Needed for'].map(t=>h('th',{},t)))));
  const tbody = h('tbody');
  d.cash.forEach(row => tbody.appendChild(h('tr',{},
    h('td',{},row.country),h('td',{},row.currency),h('td',{},row.days),
    h('td',{class:'cash-amount'},row.bring),h('td',{},row.for)
  )));
  tbody.appendChild(h('tr',{style:'background:var(--warm)'},
    h('td',{colspan:'3'},h('strong',{},'Total')),
    h('td',{class:'cash-amount'},d.cashTotal.amount),
    h('td',{},d.cashTotal.breakdown)
  ));
  tbl.appendChild(tbody);
  tableWrap.appendChild(tbl);
  wrap.appendChild(tableWrap);
  return wrap;
}

function renderReminders(d) {
  const wrap = div('', h('p', {class:'section-title'}, 'Key Reminders'));
  const grid = div('reminders-grid');
  d.reminders.forEach(r => grid.appendChild(div('reminder-item',
    h('div',{class:'reminder-icon'},r.icon),
    h('div',{html:r.text})
  )));
  wrap.appendChild(grid);
  return wrap;
}

// ─── MAIN ───────────────────────────────────────────────────────────────────
async function init() {
  try {
    const res = await fetch(DATA_FILE);
    if (!res.ok) throw new Error('Failed to load ' + DATA_FILE);
    const d = await res.json();

    const app = document.getElementById('app');
    app.appendChild(renderHero(d));
    app.appendChild(renderStrip(d));

    const container = div('container');
    container.appendChild(renderFlights(d));
    container.appendChild(renderCars(d));
    container.appendChild(renderTripMaps(d));        // ← NEW: Full Route Maps
    container.appendChild(renderAccommodation(d));

    container.appendChild(h('p', {class:'section-title'}, 'Day-by-Day Itinerary'));
    container.appendChild(renderSummaryTable(d));    // ← UPDATED: 8-column glance table

    const daysGrid = div('days-grid');
    let cardIdx = 0;
    d.days.forEach(day => {
      if (day.dayLabel === '1–2' && day.sections.length >= 2) {
        // Split Day 1-2 into two separate day cards
        const day1 = {
          dayLabel:'1', date:'Jun 20', title:'Reykjanes + Geysir + South Coast',
          meta:'Jun 20 · Eyrarbakki base', flag:day.flag, birthday:null,
          mapLinks:[day.mapLinks[0]], sections:[day.sections[0]],
          tags:day.tags.filter(t => !t.text.includes('BergOne')&&!t.text.includes('glacierlagoon')&&!t.text.includes('Puffin')&&!t.text.includes('Yoda')&&!t.text.includes('Parka'))
        };
        const day2 = {
          dayLabel:'2', date:'Jun 21', title:'South Coast Full Push + Reykjanes Golden Hour',
          meta:'Jun 21 · Back at BergOne by 9pm', flag:day.flag, birthday:null,
          mapLinks:day.mapLinks.slice(1), sections:[day.sections[1]],
          tags:day.tags.filter(t => !t.text.includes('Guesthouse 77')&&!t.text.includes('alarm 5:15'))
        };
        daysGrid.appendChild(renderDayCard(day1, cardIdx++));
        daysGrid.appendChild(renderDayCard(day2, cardIdx++));
      } else {
        daysGrid.appendChild(renderDayCard(day, cardIdx++));
      }
    });
    container.appendChild(daysGrid);

    container.appendChild(renderChecklist(d));
    container.appendChild(renderBudget(d));
    container.appendChild(renderCash(d));
    container.appendChild(renderReminders(d));
    app.appendChild(container);

    const m = d.meta;
    app.appendChild(h('footer',{},
      h('strong',{}, m.title+' · '+m.departure.split(' ')[1]+' '+m.departure.split(' ')[0]+' – '+m.return.split(' ')[1]+' '+m.return.split(' ')[0]+', 2026'),
      h('br'),
      h('span',{}, m.traveller_names.join(' · '))
    ));
  } catch(e) {
    document.getElementById('app').innerHTML = '<div style="padding:40px;text-align:center;color:red">Error loading trip data: '+e.message+'</div>';
    console.error(e);
  }
}

init();
</script>
