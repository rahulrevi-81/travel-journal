<style>
  :root {
    --ink: #1a1a2e;
    --cream: #faf8f3;
    --warm: #f5efe6;
    --gold: #c9a84c;
    --gold-light: #e8d5a3;
    --rust: #b85c38;
    --sage: #6b8f71;
    --slate: #4a5568;
    --border: #e2d9cc;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--ink); font-size: 15px; line-height: 1.7; }

  /* HERO */
  .hero { background: var(--ink); color: var(--cream); padding: 80px 40px 60px; text-align: center; position: relative; overflow: hidden; }
  .hero::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse at 30% 50%, rgba(201,168,76,0.15) 0%, transparent 60%), radial-gradient(ellipse at 70% 30%, rgba(107,143,113,0.1) 0%, transparent 50%); }
  .hero-flags { font-size: 28px; letter-spacing: 6px; margin-bottom: 20px; position: relative; }
  .hero h1 { font-family: 'Playfair Display', serif; font-size: clamp(36px, 6vw, 72px); font-weight: 900; line-height: 1.1; margin-bottom: 16px; position: relative; }
  .hero h1 em { font-style: italic; color: var(--gold-light); }
  .hero-sub { font-size: 15px; font-weight: 300; letter-spacing: 2px; text-transform: uppercase; color: rgba(250,248,243,0.6); margin-bottom: 40px; position: relative; }
  .hero-stats { display: flex; justify-content: center; gap: 40px; flex-wrap: wrap; position: relative; }
  .stat { text-align: center; }
  .stat-num { font-family: 'Playfair Display', serif; font-size: 36px; font-weight: 700; color: var(--gold-light); display: block; line-height: 1; }
  .stat-label { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: rgba(250,248,243,0.5); margin-top: 4px; }

  /* LAYOUT */
  .container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }
  .section-title { font-family: 'Playfair Display', serif; font-size: 11px; letter-spacing: 4px; text-transform: uppercase; color: var(--gold); margin-bottom: 24px; margin-top: 56px; display: flex; align-items: center; gap: 12px; }
  .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  /* BOOKING STRIP */
  .booking-strip { background: var(--ink); color: var(--cream); padding: 24px 40px; display: flex; gap: 32px; flex-wrap: wrap; justify-content: center; }
  .booking-item { display: flex; align-items: center; gap: 10px; font-size: 13px; }
  .booking-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--sage); flex-shrink: 0; }
  .booking-dot.pending { background: var(--gold); }
  .booking-ref { font-family: 'DM Sans', sans-serif; font-weight: 500; font-size: 12px; color: var(--gold-light); }

  /* ACCOMMODATION TABLE */
  .accom-table { width: 100%; border-collapse: collapse; min-width: 500px; }
  .accom-table th { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--slate); font-weight: 500; text-align: left; padding: 8px 12px; border-bottom: 2px solid var(--border); }
  .accom-table td { padding: 12px 12px; border-bottom: 1px solid var(--border); font-size: 13px; vertical-align: top; }
  .accom-table tr:hover td { background: var(--warm); }
  .accom-table .booked { color: var(--sage); font-weight: 500; font-size: 11px; }
  .accom-table .pending { color: var(--gold); font-weight: 500; font-size: 11px; }
  .accom-table .prop { font-weight: 500; }
  .accom-table .ref { font-size: 11px; color: var(--slate); }
  .stars { color: var(--gold); font-size: 11px; }

  /* TRIP MAPS */
  .trip-maps-grid { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 4px; }
  .trip-map-card { display: flex; align-items: center; gap: 14px; padding: 16px 20px; background: white; border: 1px solid var(--border); border-radius: 4px; text-decoration: none; color: inherit; flex: 1; min-width: 260px; transition: all 0.15s; }
  .trip-map-card:hover { background: var(--warm); border-color: var(--gold); box-shadow: 0 2px 12px rgba(201,168,76,0.15); }
  .trip-map-icon { font-size: 26px; flex-shrink: 0; }
  .trip-map-label { font-weight: 600; font-size: 14px; line-height: 1.3; }
  .trip-map-desc { font-size: 11px; color: var(--slate); margin-top: 2px; letter-spacing: 0.3px; }
  .trip-map-arrow { font-size: 16px; color: var(--gold); margin-left: auto; flex-shrink: 0; }

  /* DAY CARDS — schedule style */
  .days-grid { display: flex; flex-direction: column; gap: 16px; margin-top: 8px; }
  .day-card { border: 1px solid var(--border); border-radius: 4px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
  .day-header { display: grid; grid-template-columns: 72px 1fr auto; align-items: center; gap: 16px; padding: 14px 20px; cursor: pointer; background: var(--ink); color: var(--cream); user-select: none; }
  .day-num-wrap { display: flex; flex-direction: column; }
  .day-num { font-family: 'Playfair Display', serif; font-size: 26px; font-weight: 900; color: var(--gold); line-height: 1; }
  .day-date-small { font-size: 10px; color: rgba(250,248,243,0.45); font-weight: 400; margin-top: 2px; letter-spacing: 0.5px; }
  .day-info { flex: 1; }
  .day-title { font-family: 'Playfair Display', serif; font-weight: 700; font-size: 15px; line-height: 1.2; color: var(--cream); }
  .day-meta { font-size: 11px; color: rgba(250,248,243,0.45); letter-spacing: 0.5px; margin-top: 3px; }
  .day-flag-toggle { display: flex; align-items: center; gap: 10px; }
  .day-flag { font-size: 20px; }
  .day-toggle { color: rgba(250,248,243,0.5); font-size: 16px; transition: transform 0.2s; }
  .day-card.open .day-toggle { transform: rotate(180deg); }
  .day-body { display: none; background: white; }
  .day-card.open .day-body { display: block; }
  .day-map-row { padding: 10px 16px; background: #f8f5ef; border-bottom: 1px solid var(--border); display: flex; flex-wrap: wrap; gap: 6px; }
  .day-map-link { display: inline-flex; align-items: center; gap: 6px; font-size: 11px; letter-spacing: 1px; text-transform: uppercase; color: var(--slate); text-decoration: none; border: 1px solid var(--border); padding: 4px 10px; border-radius: 2px; transition: all 0.15s; background: white; }
  .day-map-link:hover { background: var(--ink); color: var(--cream); border-color: var(--ink); }
  .sched-grid { display: grid; grid-template-columns: 72px 1fr; }
  .sched-time { background: #f8f5ef; border-right: 2px solid var(--border); padding: 10px; font-size: 11px; font-weight: 500; color: #2b6cb0; letter-spacing: 0.3px; border-bottom: 1px solid #ece8df; display: flex; align-items: flex-start; padding-top: 12px; }
  .sched-item { padding: 9px 14px; border-bottom: 1px solid #f0ece4; display: flex; align-items: flex-start; gap: 8px; min-height: 40px; font-size: 13px; }
  .sched-item:last-child { border-bottom: none; }
  .sched-item.wow   { background: linear-gradient(135deg,#fffdf0,#fef9e7); border-left: 3px solid var(--gold); }
  .sched-item.hike  { background: linear-gradient(135deg,#f0f8f0,#e8f5e8); border-left: 3px solid #4a7c2f; }
  .sched-item.meal  { background: #faf8f4; border-left: 3px solid var(--border); }
  .sched-item.drive { background: #f8f8fc; border-left: 3px solid #b0b8d4; }
  .sched-item.checkin { background: #f8faf8; border-left: 3px solid var(--sage); }
  .sched-item.planb { background: #fdf8f0; border-left: 3px solid #e67e22; }
  .sched-icon { font-size: 14px; flex-shrink: 0; margin-top: 1px; }
  .sched-text { flex: 1; line-height: 1.5; color: #2a2a3e; }
  .sched-text strong { font-weight: 500; color: var(--ink); }
  .sched-badge { font-size: 9px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; padding: 2px 6px; border-radius: 2px; flex-shrink: 0; margin-top: 2px; }
  .badge-wow  { background: var(--gold); color: white; }
  .badge-hike { background: #4a7c2f; color: white; }
  .day-footer-stats { background: #f8f5ef; border-top: 1px solid var(--border); padding: 8px 16px; display: flex; gap: 20px; flex-wrap: wrap; }
  .day-footer-stat { font-size: 11px; color: #666; }
  .day-footer-stat strong { color: var(--ink); font-weight: 500; }
  .sec-heading { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--slate); margin-bottom: 6px; margin-top: 14px; padding: 0 14px; }
  .booking-tag { display: inline-flex; align-items: center; gap: 6px; font-size: 11px; background: rgba(107,143,113,0.12); color: var(--sage); border: 1px solid rgba(107,143,113,0.3); padding: 4px 10px; border-radius: 2px; margin-top: 8px; margin-right: 6px; }
  .laundry-tag { display: inline-flex; align-items: center; gap: 6px; font-size: 11px; background: rgba(201,168,76,0.1); color: #8a6e1a; border: 1px solid rgba(201,168,76,0.3); padding: 4px 10px; border-radius: 2px; margin-top: 6px; margin-right: 6px; }
  .alarm-tag { display: inline-flex; align-items: center; gap: 6px; font-size: 11px; background: rgba(184,92,56,0.1); color: var(--rust); border: 1px solid rgba(184,92,56,0.3); padding: 4px 10px; border-radius: 2px; margin-top: 6px; margin-right: 6px; }
  .birthday-banner { background: linear-gradient(135deg,#2d5016,#1a3a0a); color: #d4e8c2; padding: 8px 16px; font-size: 12px; font-weight: 500; letter-spacing: 1px; text-align: center; }

  /* CHECKLIST */
  .checklist { display: flex; flex-direction: column; gap: 1px; margin-top: 8px; }
  .check-item { display: flex; align-items: center; gap: 14px; padding: 12px 16px; background: white; border: 1px solid var(--border); border-radius: 2px; font-size: 13px; }
  .check-icon { width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; flex-shrink: 0; }
  .check-icon.done    { background: var(--sage);  color: white; }
  .check-icon.urgent  { background: var(--rust);  color: white; }
  .check-icon.pending { background: var(--gold);  color: white; }
  .check-main { flex: 1; font-weight: 500; }
  .check-deadline { font-size: 11px; color: var(--slate); }
  .check-status-done    { font-size: 11px; color: var(--sage); font-weight: 500; }
  .check-status-pending { font-size: 11px; color: var(--gold); }
  .check-status-urgent  { font-size: 11px; color: var(--rust); font-weight: 600; }
  .check-link { font-size: 11px; color: var(--slate); text-decoration: none; }
  .check-link:hover { color: var(--ink); }

  /* BUDGET */
  .budget-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; margin-top: 8px; }
  .budget-item { background: white; border: 1px solid var(--border); border-radius: 4px; padding: 16px; }
  .budget-cat { font-size: 11px; letter-spacing: 1px; text-transform: uppercase; color: var(--slate); margin-bottom: 6px; }
  .budget-range { font-family: 'Playfair Display', serif; font-size: 20px; color: var(--ink); }
  .budget-total { grid-column: 1 / -1; background: var(--ink); color: var(--cream); border-color: var(--ink); }
  .budget-total .budget-cat { color: var(--gold-light); }
  .budget-total .budget-range { color: var(--gold-light); font-size: 28px; }

  /* CASH */
  .cash-table { width: 100%; border-collapse: collapse; margin-top: 8px; }
  .cash-table th { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--slate); font-weight: 500; text-align: left; padding: 8px 12px; border-bottom: 2px solid var(--border); }
  .cash-table td { padding: 10px 12px; border-bottom: 1px solid var(--border); font-size: 13px; }
  .cash-table tr:hover td { background: var(--warm); }
  .cash-amount { font-weight: 600; color: var(--ink); }

  /* REMINDERS */
  .reminders-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 12px; margin-top: 8px; }
  .reminder-item { background: white; border: 1px solid var(--border); border-radius: 4px; padding: 16px; font-size: 13px; display: flex; gap: 10px; align-items: flex-start; }
  .reminder-icon { font-size: 18px; flex-shrink: 0; margin-top: 1px; }

  /* SUMMARY / GLANCE TABLE — 8 columns */
  .glance-table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 1500px; }
  .glance-table th { background: var(--ink); color: var(--gold-light); text-transform: uppercase; letter-spacing: 0.5px; padding: 12px 16px; text-align: left; white-space: nowrap; font-size: 10px; }
  .glance-table td { padding: 10px 16px; border-bottom: 1px solid var(--border); vertical-align: top; }
  .glance-table tr:nth-child(odd) td  { background: var(--warm); }
  .glance-table tr:nth-child(even) td { background: white; }
  .glance-table tr:hover td { background: #f0f7f1; }
  .g-day  { font-family: 'Playfair Display', serif; font-weight: 700; color: var(--gold); white-space: nowrap; font-size: 15px; vertical-align: middle !important; min-width: 50px; }
  .g-date { white-space: nowrap; color: var(--slate); font-size: 11px; vertical-align: middle !important; min-width: 70px; }
  .g-from { font-size: 12px; white-space: nowrap; vertical-align: middle !important; min-width: 160px; }
  .g-stay { font-size: 12px; color: var(--slate); white-space: nowrap; vertical-align: middle !important; min-width: 200px; }
  .g-drive { text-align: center; font-size: 12px; white-space: nowrap; font-weight: 500; vertical-align: middle !important; min-width: 130px; }
  .g-time  { text-align: center; font-size: 11px; color: var(--slate); white-space: nowrap; vertical-align: middle !important; min-width: 110px; }
  .g-bookings { font-size: 11px; line-height: 1.9; min-width: 200px; white-space: normal; }
  .g-map { text-align: center; vertical-align: middle !important; white-space: nowrap; min-width: 80px; }
  .g-map a { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; color: var(--slate); text-decoration: none; border: 1px solid var(--border); padding: 5px 12px; border-radius: 2px; transition: all 0.15s; white-space: nowrap; }
  .g-map a:hover { background: var(--ink); color: var(--cream); border-color: var(--ink); }
  /* Highlight pills */
  .g-highlights { min-width: 300px; max-width: 420px; padding-top: 10px !important; padding-bottom: 10px !important; }
  .hl-pills { display: flex; flex-wrap: wrap; gap: 4px; }
  .hl-pill { display: inline-block; background: rgba(201,168,76,0.12); color: #6b5010; border: 1px solid rgba(201,168,76,0.3); border-radius: 20px; padding: 3px 10px; font-size: 10px; font-weight: 500; white-space: nowrap; letter-spacing: 0.2px; }
  .bk-done    { color: #27ae60; font-weight: 600; font-size: 11px; }
  .bk-pending { color: #e67e22; font-weight: 600; font-size: 11px; }
  .g-action { min-width: 120px; vertical-align: middle !important; }
  .act-ok   { display:inline-block; font-size:10px; font-weight:600; padding:3px 8px; border-radius:20px; background:#eaf3de; color:#3b6d11; white-space:nowrap; }
  .act-pend { display:inline-block; font-size:10px; font-weight:600; padding:3px 8px; border-radius:20px; background:#faeeda; color:#854f0b; white-space:nowrap; }
  .act-red  { display:inline-block; font-size:10px; font-weight:600; padding:3px 8px; border-radius:20px; background:#fcebeb; color:#a32d2d; white-space:nowrap; }
  .export-bar { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
  .export-bar-title { font-family:'Playfair Display',serif; font-size:11px; letter-spacing:4px; text-transform:uppercase; color:var(--gold); display:flex; align-items:center; gap:12px; }
  .export-bar-title::after { content:''; flex:1; height:1px; background:var(--border); }
  .btn-export { display:inline-flex; align-items:center; gap:7px; background:var(--ink); color:var(--cream); border:none; border-radius:3px; padding:8px 16px; font-size:12px; font-weight:500; letter-spacing:0.5px; cursor:pointer; font-family:'DM Sans',sans-serif; transition:opacity 0.15s; white-space:nowrap; flex-shrink:0; }
  .btn-export:hover { opacity:0.82; }
  .btn-export svg { width:14px; height:14px; fill:currentColor; flex-shrink:0; }
  .glance-table tr.row-action td { border-left: 3px solid #e24b4a; }
  .glance-table tr.row-pending td { border-left: 3px solid #ef9f27; }
  .glance-table tr.row-ok td { border-left: 3px solid #639922; }

  /* FOOTER */
  footer { background: var(--ink); color: rgba(250,248,243,0.4); text-align: center; padding: 32px; margin-top: 80px; font-size: 12px; letter-spacing: 1px; }
  footer strong { color: var(--gold-light); }

  @media (max-width: 600px) {
    .hero { padding: 50px 20px 40px; }
    .hero-stats { gap: 24px; }
    .booking-strip { padding: 16px 20px; gap: 16px; }
    .day-body { padding: 16px; }
    .trip-map-card { min-width: 100%; }
  }
</style>
</head>

// ─── HELPERS ────────────────────────────────────────────────────────────────
const h = (tag, attrs, ...children) => {
  const el = document.createElement(tag);
  if (attrs) Object.entries(attrs).forEach(([k,v]) => {
    if (k === 'class') el.className = v;
    else if (k === 'html') el.innerHTML = v;
    else if (k.startsWith('on')) el.addEventListener(k.slice(2), v);
    else el.setAttribute(k, v);
  });
  children.flat().forEach(c => c && el.appendChild(typeof c === 'string' ? document.createTextNode(c) : c));
  return el;
};
const div  = (cls, ...c) => h('div', {class: cls}, ...c);
const span = (cls, txt) => h('span', {class: cls, html: txt});
const p    = (cls, txt) => h('p', {class: cls, html: txt});

function tagEl(tag) {
  const cls = { booking: 'booking-tag', laundry: 'laundry-tag', alarm: 'alarm-tag' }[tag.type] || 'alarm-tag';
  return h('span', {class: cls, html: tag.text});
}

// ─── RENDER FUNCTIONS ───────────────────────────────────────────────────────
// ── Export Trip at a Glance to Excel ─────────────────────────────────────────
function exportGlanceToExcel(d) {
  const rows = [
    ['Day','Date','Country','Departing From','Night Stay','Highlights','Drive','Drive Time','Action / Status','Map Link']
  ];

  (d.glance || []).forEach(g => {
    const action = g.action ? g.action.text : '✓ Booked';
    // Strip emojis from flag for cleaner Excel
    rows.push([
      'Day ' + g.day,
      g.date,
      g.flag || '',
      g.from || '',
      g.nightStay || '',
      g.highlights || '',
      g.drive || '',
      g.driveTime || '',
      action,
      g.mapUrl || ''
    ]);
  });

  const wb = XLSX.utils.book_new();
  const ws = XLSX.utils.aoa_to_sheet(rows);

  // Column widths
  ws['!cols'] = [
    {wch:8},{wch:10},{wch:6},{wch:28},{wch:32},{wch:60},{wch:16},{wch:12},{wch:36},{wch:14}
  ];

  // Style header row bold — SheetJS CE supports basic cell props
  const headerRange = XLSX.utils.decode_range(ws['!ref']);
  for (let C = headerRange.s.c; C <= headerRange.e.c; C++) {
    const cellAddr = XLSX.utils.encode_cell({r:0, c:C});
    if (!ws[cellAddr]) continue;
    ws[cellAddr].s = { font:{bold:true}, fill:{fgColor:{rgb:'1A1A2E'}}, alignment:{wrapText:true} };
  }

  // Wrap text for all cells
  for (let R = 1; R <= headerRange.e.r; R++) {
    for (let C = headerRange.s.c; C <= headerRange.e.c; C++) {
      const addr = XLSX.utils.encode_cell({r:R, c:C});
      if (ws[addr]) ws[addr].s = { alignment:{wrapText:true, vertical:'top'} };
    }
  }

  // Add checklist sheet
  const clRows = [['#','Item','Status','Reference','Deadline','Link']];
  (d.checklist || []).forEach((item,i) => {
    clRows.push([
      i+1,
      item.label || '',
      item.status || '',
      item.ref || '',
      item.deadline || '',
      item.link || ''
    ]);
  });
  const wsCl = XLSX.utils.aoa_to_sheet(clRows);
  wsCl['!cols'] = [{wch:4},{wch:48},{wch:10},{wch:32},{wch:16},{wch:40}];

  // Add accommodation sheet
  const accRows = [['Dates','Property','Address','Status','Reference','Free Cancel']];
  (d.accommodation || []).forEach(a => {
    if (a.status === 'cancelled') return;
    accRows.push([
      a.dates || '',
      a.property || '',
      a.address || '',
      a.status || '',
      a.ref || '',
      a.freeCancel || ''
    ]);
  });
  const wsAcc = XLSX.utils.aoa_to_sheet(accRows);
  wsAcc['!cols'] = [{wch:14},{wch:40},{wch:36},{wch:10},{wch:44},{wch:22}];

  XLSX.utils.book_append_sheet(wb, ws,    'Trip at a Glance');
  XLSX.utils.book_append_sheet(wb, wsCl,  'Booking Checklist');
  XLSX.utils.book_append_sheet(wb, wsAcc, 'Accommodation');

  const filename = 'Europe-2026-PlanB-' + new Date().toISOString().slice(0,10) + '.xlsx';
  XLSX.writeFile(wb, filename);
}

// Classify an item text into a schedule row type
function classifyItem(text) {
  const t = text.toLowerCase();
  if (t.includes('check in') || t.includes('check-in') || t.includes('night at') || t.includes('night —') || t.includes('✅')) return 'checkin';
  if (t.includes('lunch') || t.includes('dinner') || t.includes('breakfast') || t.includes('fondue') || t.includes('meal') || t.includes('eat')) return 'meal';
  if (t.includes('⭐') || t.includes('plan a') || t.includes('plan b') || t.includes('optional')) {
    if (t.includes('plan b') || t.includes('backup')) return 'planb';
    return 'wow';
  }
  if (t.includes('hike') || t.includes('walk') || t.includes('trail') || t.includes('summit') || t.includes('gorge') || t.includes('climb') || t.includes('loop') || t.includes('ascent') || t.includes('gondola') || t.includes('cable car') || t.includes('trek')) return 'hike';
  if (t.includes('drive') || t.includes('fly') || t.includes('flight') || t.includes('board') || t.includes('depart') || t.includes('leave') || t.includes('→') || t.includes('pick up car') || t.includes('return') && t.includes('car')) return 'drive';
  return '';
}

function iconForType(type, text) {
  const t = text.toLowerCase();
  if (type === 'checkin') return '🏠';
  if (type === 'meal') {
    if (t.includes('lunch')) return '🍽';
    if (t.includes('dinner')) return '🍽';
    return '🍽';
  }
  if (type === 'wow') return '⭐';
  if (type === 'planb') return '⚠️';
  if (type === 'hike') return '🥾';
  if (type === 'drive') {
    if (t.includes('fly') || t.includes('flight') || t.includes('board')) return '✈️';
    return '🚗';
  }
  return '•';
}

  info.appendChild(div('day-meta', day.meta));
  header.appendChild(info);
  const flagToggle = div('day-flag-toggle');
  flagToggle.appendChild(h('div', {class:'day-flag'}, day.flag));
  flagToggle.appendChild(div('day-toggle', '▾'));
  header.appendChild(flagToggle);
  card.appendChild(header);

  // Body
  const body = div('day-body');
  if (day.birthday) body.appendChild(h('div', {class:'birthday-banner', html: '🎂 ' + day.birthday}));

  // Map links row
  if (day.mapLinks && day.mapLinks.length) {
    const mapRow = div('day-map-row');
    day.mapLinks.forEach(ml => mapRow.appendChild(
      h('a', {class:'day-map-link', href:ml.url, target:'_blank', rel:'noopener'}, '📍 ' + ml.label)
    ));
    body.appendChild(mapRow);
  }

  // Schedule grid — items from all sections
  const grid = div('sched-grid');
  day.sections.forEach(sec => {
    if (sec.heading && day.sections.length > 1) {
      // Section heading spans both columns
      const headingEl = h('div', {style:'grid-column:1/-1;', class:'sec-heading'}, sec.heading);
      grid.appendChild(headingEl);
    }
    sec.items.forEach(item => {
      const type = classifyItem(item);
      const icon = iconForType(type, item);
      const timeCell = h('div', {class:'sched-time'}, '');
      const itemCell = h('div', {class:'sched-item' + (type ? ' ' + type : '')});
      itemCell.appendChild(h('span', {class:'sched-icon'}, icon));
      const textEl = h('span', {class:'sched-text', html: item});
      itemCell.appendChild(textEl);
      if (type === 'wow') itemCell.appendChild(h('span', {class:'sched-badge badge-wow'}, 'WOW'));
      if (type === 'hike') itemCell.appendChild(h('span', {class:'sched-badge badge-hike'}, 'HIKE'));
      grid.appendChild(timeCell);
      grid.appendChild(itemCell);
    });
  });
  body.appendChild(grid);

  // Tags row
  if (day.tags && day.tags.length) {
    const tagWrap = h('div', {style:'padding:10px 14px 12px;display:flex;flex-wrap:wrap;gap:6px;background:#fafaf8;border-top:1px solid var(--border);'});
    day.tags.forEach(t => tagWrap.appendChild(tagEl(t)));
    body.appendChild(tagWrap);
  }

  // Footer stats from summary
  if (day.summary) {
    const s = day.summary;
    const stats = [];
    if (s.drive && s.drive !== '—') stats.push(['Drive', s.drive]);
    if (s.highlights) stats.push(['Highlights', s.highlights.split(' · ').slice(0,3).join(' · ')]);
    if (stats.length) {
      const footer = div('day-footer-stats');
      stats.forEach(([k,v]) => {
        const st = div('day-footer-stat');
        st.innerHTML = '<strong>' + k + ':</strong> ' + v;
        footer.appendChild(st);
      });
      body.appendChild(footer);
    }
  }

  card.appendChild(body);
  return card;
}

// ── UPDATED: Trip at a Glance — 8 columns ───────────────────────────────────
function renderSummaryTable(d) {
  const wrap = div('');
  // Export bar — title + button side by side
  const exportBar = h('div', {class:'export-bar'});
  const barTitle = h('p', {class:'section-title', style:'margin-top:0;margin-bottom:0;flex:1;'}, 'Trip at a Glance');
  const btnExport = h('button', {class:'btn-export', title:'Download as Excel'});
  btnExport.innerHTML = '<svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6zm-1 7V3.5L18.5 9H13zM8 17l2-3-2-3h1.5l1.25 2 1.25-2H13.5l-2 3 2 3H12l-1.25-2L9.5 17H8z"/></svg> Export to Excel';
  btnExport.onclick = function() { exportGlanceToExcel(d); };
  exportBar.appendChild(barTitle);
  exportBar.appendChild(btnExport);
  wrap.appendChild(exportBar);
  const tableWrap = h('div', {style:'overflow-x:auto;margin-bottom:32px;'});
  const tbl = h('table', {class:'glance-table'});

  tbl.appendChild(h('thead', {}, h('tr', {},
    ...['Day','Date','Starting Place','Night Stay','Highlights','Drive','Drive Time','Action','Map']
      .map(t => h('th',{},t))
  )));

  const tbody = h('tbody');

  (d.glance || []).forEach(g => {
    const bkTd = h('td', {class:'g-bookings'});
    g.bookings.split(' · ').forEach(b => {
      const s = h('span', {style:'display:block'});
      s.className = b.startsWith('✓') ? 'bk-done' : 'bk-pending';
      s.textContent = b;
      bkTd.appendChild(s);
    });

    // Render highlights as pills
    const hlTd = h('td', {class:'g-highlights'});
    const pillWrap = div('hl-pills');
    g.highlights.split(' · ').forEach(place => {
      if (place.trim()) pillWrap.appendChild(h('span', {class:'hl-pill'}, place.trim()));
    });
    hlTd.appendChild(pillWrap);

    // Map link
    const mapTd = h('td', {class:'g-map'});
    if (g.mapUrl) {
      mapTd.appendChild(h('a', {href: g.mapUrl, target:'_blank', rel:'noopener'}, '📍 Map'));
    } else {
      mapTd.appendChild(h('span', {style:'color:var(--slate);font-size:11px'}, '—'));
    }

    // Action cell
    const actTd = h('td', {class:'g-action'});
    let rowClass = 'row-ok';
    if (g.action) {
      const cls = g.action.level === 'action' ? 'act-red' : g.action.level === 'pending' ? 'act-pend' : 'act-ok';
      rowClass = g.action.level === 'action' ? 'row-action' : g.action.level === 'pending' ? 'row-pending' : 'row-ok';
      const lines = g.action.text.split(' · ');
      lines.forEach(line => {
        const sp = h('span', {class: cls, style: 'display:block; margin-bottom:3px;'});
        sp.textContent = line;
        actTd.appendChild(sp);
      });
    } else {
      actTd.appendChild(h('span', {class:'act-ok'}, '✓ Booked'));
    }
    tbody.appendChild(h('tr', {class: rowClass},
      h('td', {class:'g-day'},   g.day),
      h('td', {class:'g-date'},  g.date),
      h('td', {class:'g-from'},  g.from),
      h('td', {class:'g-stay'},  g.nightStay),
      hlTd,
      h('td', {class:'g-drive'}, g.drive),
      h('td', {class:'g-time'},  g.driveTime),
      actTd,
      mapTd
    ));
  });

  tbl.appendChild(tbody);
  tableWrap.appendChild(tbl);
  wrap.appendChild(tableWrap);
  return wrap;
}

function renderChecklist(d) {
  const wrap = div('', h('p', {class:'section-title'}, 'Booking Checklist'));
  const list = div('checklist');
  d.checklist.forEach(item => {
    const iconClass = {done:'done',pending:'pending',urgent:'urgent'}[item.status]||'pending';
    const row = div('check-item',
      h('div',{class:'check-icon '+iconClass}, item.status==='done'?'✓':'!'),
      h('div',{class:'check-main'},item.label)
    );
    if (item.deadline) row.appendChild(h('div',{class:'check-deadline'},item.deadline));
    if (item.status==='done'&&item.ref)       row.appendChild(h('span',{class:'check-status-done'},item.ref));
    else if (item.status==='pending')          row.appendChild(h('span',{class:'check-status-pending'},'⏳ Pending'));
    else if (item.status==='urgent')           row.appendChild(h('span',{class:'check-status-urgent'},'⚠️ Action needed'));
    if (item.link) row.appendChild(h('a',{class:'check-link',href:item.link,target:'_blank'},' →'));
    list.appendChild(row);
  });
  wrap.appendChild(list);
  return wrap;
}

function renderBudget(d) {
  const wrap = div('', h('p', {class:'section-title'}, 'Budget'));
  const grid = div('budget-grid');
  d.budget.forEach(b => {
    const item = div('budget-item');
    item.appendChild(h('div',{class:'budget-cat'},b.cat));
    item.appendChild(h('div',{class:'budget-range'},b.amount));
    grid.appendChild(item);
  });
  const total = div('budget-item budget-total');
  total.appendChild(h('div',{class:'budget-cat'},'Confirmed so far · Total Estimated'));
  total.appendChild(h('div',{class:'budget-range'},d.budgetSummary.confirmed+' · '+d.budgetSummary.estimated));
  grid.appendChild(total);
  wrap.appendChild(grid);

  wrap.appendChild(h('p',{class:'section-title',style:'margin-top:32px'},'Accommodation Breakdown'));
  const tableWrap = h('div',{style:'overflow-x:auto'});
  const tbl = h('table',{class:'accom-table'});
  tbl.appendChild(h('thead',{},h('tr',{},h('th',{},'Property'),h('th',{},'Paid'))));
  const tbody = h('tbody');
  d.accommodationBreakdown.forEach(row =>
    tbody.appendChild(h('tr',{},h('td',{},row.property),h('td',{html:row.paid})))
  );
  tbody.appendChild(h('tr',{style:'background:var(--warm)'},
    h('td',{},h('strong',{},'Total')),h('td',{},h('strong',{},'~$2,888'))
  ));
  tbl.appendChild(tbody);
  tableWrap.appendChild(tbl);
  wrap.appendChild(tableWrap);
  return wrap;
}

function renderCash(d) {
  const wrap = div('', h('p', {class:'section-title'}, 'Cash & Currency Guide'));
  const tableWrap = h('div',{style:'overflow-x:auto'});
  const tbl = h('table',{class:'cash-table'});
  tbl.appendChild(h('thead',{},h('tr',{},...['Country','Currency','Days','Bring','Needed for'].map(t=>h('th',{},t)))));
  const tbody = h('tbody');
  d.cash.forEach(row => tbody.appendChild(h('tr',{},
    h('td',{},row.country),h('td',{},row.currency),h('td',{},row.days),
    h('td',{class:'cash-amount'},row.bring),h('td',{},row.for)
  )));
  tbody.appendChild(h('tr',{style:'background:var(--warm)'},
    h('td',{colspan:'3'},h('strong',{},'Total')),
    h('td',{class:'cash-amount'},d.cashTotal.amount),
    h('td',{},d.cashTotal.breakdown)
  ));
  tbl.appendChild(tbody);
  tableWrap.appendChild(tbl);
  wrap.appendChild(tableWrap);
  return wrap;
}

function renderReminders(d) {
  const wrap = div('', h('p', {class:'section-title'}, 'Key Reminders'));
  const grid = div('reminders-grid');
  d.reminders.forEach(r => grid.appendChild(div('reminder-item',
    h('div',{class:'reminder-icon'},r.icon),
    h('div',{html:r.text})
  )));
  wrap.appendChild(grid);
  return wrap;
}

// ─── MAIN ───────────────────────────────────────────────────────────────────
async function init() {
  try {
    const d = _INLINE_DATA;

    const app = document.getElementById('app');
    app.appendChild(renderHero(d));
    app.appendChild(renderStrip(d));

    const container = div('container');
    container.appendChild(renderFlights(d));
    container.appendChild(renderCars(d));
    container.appendChild(renderTripMaps(d));        // ← NEW: Full Route Maps
    container.appendChild(renderAccommodation(d));

    container.appendChild(h('p', {class:'section-title'}, 'Day-by-Day Itinerary'));
    container.appendChild(renderSummaryTable(d));    // ← UPDATED: 8-column glance table

    const daysGrid = div('days-grid');
    let cardIdx = 0;
    d.days.forEach(day => {
      if (day.dayLabel === '1–2' && day.sections.length >= 2) {
        // Split Day 1-2 into two separate day cards
        const day1 = {
          dayLabel:'1', date:'Jun 20', title:'Reykjanes + Geysir + South Coast',
          meta:'Jun 20 · Eyrarbakki base', flag:day.flag, birthday:null,
          mapLinks:[day.mapLinks[0]], sections:[day.sections[0]],
          tags:day.tags.filter(t => !t.text.includes('BergOne')&&!t.text.includes('glacierlagoon')&&!t.text.includes('Puffin')&&!t.text.includes('Yoda')&&!t.text.includes('Parka'))
        };
        const day2 = {
          dayLabel:'2', date:'Jun 21', title:'South Coast Full Push + Reykjanes Golden Hour',
          meta:'Jun 21 · Back at BergOne by 9pm', flag:day.flag, birthday:null,
          mapLinks:day.mapLinks.slice(1), sections:[day.sections[1]],
          tags:day.tags.filter(t => !t.text.includes('Guesthouse 77')&&!t.text.includes('alarm 5:15'))
        };
        daysGrid.appendChild(renderDayCard(day1, cardIdx++));
        daysGrid.appendChild(renderDayCard(day2, cardIdx++));
      } else {
        daysGrid.appendChild(renderDayCard(day, cardIdx++));
      }
    });
    container.appendChild(daysGrid);

    container.appendChild(renderChecklist(d));
    container.appendChild(renderBudget(d));
    container.appendChild(renderCash(d));
    container.appendChild(renderReminders(d));
    app.appendChild(container);

    const m = d.meta;
    app.appendChild(h('footer',{},
      h('strong',{}, m.title+' · '+m.departure.split(' ')[1]+' '+m.departure.split(' ')[0]+' – '+m.return.split(' ')[1]+' '+m.return.split(' ')[0]+', 2026'),
      h('br'),
      h('span',{}, m.traveller_names.join(' · '))
    ));
  } catch(e) {
    document.getElementById('app').innerHTML = '<div style="padding:40px;text-align:center;color:red">Error loading trip data: '+e.message+'</div>';
    console.error(e);
  }
}

init();
</script>
