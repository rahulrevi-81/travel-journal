<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Europe 2026 — VR Family Travels</title>
<link rel="manifest" href="../manifest.json">
<meta name="theme-color" content="#1a1a2e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1a2e;
    --cream: #faf8f3;
    --warm: #f5efe6;
    --gold: #c9a84c;
    --gold-light: #e8d5a3;
    --rust: #b85c38;
    --sage: #6b8f71;
    --slate: #4a5568;
    --border: #e2d9cc;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--ink); font-size: 15px; line-height: 1.7; -webkit-text-size-adjust: 100%; }

  /* HERO */
  .hero { background: var(--ink); color: var(--cream); padding: 80px 40px 60px; text-align: center; position: relative; overflow: hidden; }
  .hero::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse at 30% 50%, rgba(201,168,76,0.15) 0%, transparent 60%), radial-gradient(ellipse at 70% 30%, rgba(107,143,113,0.1) 0%, transparent 50%); }
  .hero-flags { font-size: 28px; letter-spacing: 6px; margin-bottom: 20px; position: relative; }
  .hero h1 { font-family: 'Playfair Display', serif; font-size: clamp(36px, 6vw, 72px); font-weight: 900; line-height: 1.1; margin-bottom: 16px; position: relative; }
  .hero h1 em { font-style: italic; color: var(--slate); }
  .hero-sub { font-size: 15px; font-weight: 300; letter-spacing: 2px; text-transform: uppercase; color: rgba(250,248,243,0.6); margin-bottom: 40px; position: relative; }
  .hero-stats { display: flex; justify-content: center; gap: 24px; flex-wrap: wrap; position: relative; }
  .stat { text-align: center; }
  .stat-num { font-family: 'Playfair Display', serif; font-size: 36px; font-weight: 700; color: var(--gold-light); display: block; line-height: 1; }
  .stat-label { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: rgba(250,248,243,0.75); margin-top: 4px; }

  /* LAYOUT */
  .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
  .section-title { font-family: 'Playfair Display', serif; font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--gold); margin-bottom: 24px; margin-top: 56px; display: flex; align-items: center; gap: 12px; }
  .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  /* BOOKING STRIP */
  .booking-strip { background: var(--ink); color: var(--cream); padding: 24px 40px; display: flex; gap: 32px; flex-wrap: wrap; justify-content: center; }
  .booking-item { display: flex; align-items: center; gap: 10px; font-size: 13px; }
  .booking-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--sage); flex-shrink: 0; }
  .booking-dot.pending { background: var(--gold); }
  .booking-ref { font-family: 'DM Sans', sans-serif; font-weight: 500; font-size: 12px; color: var(--gold-light); }

  /* ACCOMMODATION TABLE */
  .accom-table { width: 100%; border-collapse: collapse; min-width: 500px; }
  .accom-table th { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--slate); font-weight: 500; text-align: left; padding: 8px 12px; border-bottom: 2px solid var(--border); }
  .accom-table td { padding: 12px 12px; border-bottom: 1px solid var(--border); font-size: 13px; vertical-align: top; }
  .accom-table tr:hover td { background: var(--warm); }
  .accom-table .booked { color: var(--sage); font-weight: 500; font-size: 11px; }
  .accom-table .pending { color: var(--slate); font-weight: 500; font-size: 11px; }
  .accom-table .prop { font-weight: 500; }
  .accom-table .ref { font-size: 11px; color: var(--slate); }
  .stars { color: var(--gold); font-size: 11px; }

  /* TRIP MAPS */
  .trip-maps-grid { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 4px; }
  .trip-map-card { display: flex; align-items: center; gap: 14px; padding: 16px 20px; background: white; border: 1px solid var(--border); border-radius: 4px; text-decoration: none; color: inherit; flex: 1; min-width: 260px; transition: all 0.15s; }
  .trip-map-card:hover { background: var(--warm); border-color: var(--gold); box-shadow: 0 2px 12px rgba(201,168,76,0.15); }
  .trip-map-icon { font-size: 26px; flex-shrink: 0; }
  .trip-map-label { font-weight: 600; font-size: 14px; line-height: 1.3; }
  .trip-map-desc { font-size: 11px; color: var(--slate); margin-top: 2px; letter-spacing: 0.3px; }
  .trip-map-arrow { font-size: 16px; color: var(--gold); margin-left: auto; flex-shrink: 0; }

  /* DAY CARDS — schedule style */
  .days-grid { display: flex; flex-direction: column; gap: 16px; margin-top: 8px; }
  .day-card { border: 1px solid var(--border); border-radius: 4px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
  .day-header { display: grid; grid-template-columns: 60px 1fr auto; align-items: center; gap: 10px; padding: 12px 14px; cursor: pointer; background: var(--ink); color: var(--cream); user-select: none; }
  .day-num-wrap { display: flex; flex-direction: column; }
  .day-num { font-family: 'Playfair Display', serif; font-size: 26px; font-weight: 900; color: var(--gold); line-height: 1; }
  .day-date-small { font-size: 10px; color: rgba(250,248,243,0.80); font-weight: 400; margin-top: 2px; letter-spacing: 0.5px; }
  .day-info { flex: 1; }
  .day-title { font-family: 'Playfair Display', serif; font-weight: 700; font-size: 15px; line-height: 1.2; color: var(--cream); }
  .day-meta { font-size: 11px; color: rgba(250,248,243,0.78); letter-spacing: 0.5px; margin-top: 3px; }
  .day-flag-toggle { display: flex; align-items: center; gap: 10px; }
  .day-flag { font-size: 20px; }
  .day-toggle { color: rgba(250,248,243,0.85); font-size: 16px; transition: transform 0.2s; }
  .day-card.open .day-toggle { transform: rotate(180deg); }
  .day-body { display: none; background: white; overflow-x: hidden; }
  .day-card.open .day-body { display: block; }
  .day-map-row { padding: 10px 16px; background: #f8f5ef; border-bottom: 1px solid var(--border); display: flex; flex-wrap: wrap; gap: 6px; }
  .day-map-link { display: inline-flex; align-items: center; gap: 6px; font-size: 11px; letter-spacing: 1px; text-transform: uppercase; color: var(--slate); text-decoration: none; border: 1px solid var(--border); padding: 8px 12px; border-radius: 2px; transition: all 0.15s; background: white; min-height: 36px; }
  .day-map-link:hover { background: var(--ink); color: var(--cream); border-color: var(--ink); }
  .sched-grid { display: grid; grid-template-columns: 0px 1fr; }
  .sched-time { display: none; background: #f8f5ef; border-right: 2px solid var(--border); padding: 10px; font-size: 11px; font-weight: 500; color: #2b6cb0; letter-spacing: 0.3px; border-bottom: 1px solid #ece8df; display: flex; align-items: flex-start; padding-top: 12px; }
  .sched-item { padding: 9px 14px; border-bottom: 1px solid #f0ece4; display: flex; align-items: flex-start; gap: 8px; min-height: 40px; font-size: 13px; }
  .sched-item:last-child { border-bottom: none; }
  .sched-item.wow   { background: linear-gradient(135deg,#fffdf0,#fef9e7); border-left: 3px solid var(--gold); }
  .sched-item.hike  { background: linear-gradient(135deg,#f0f8f0,#e8f5e8); border-left: 3px solid #4a7c2f; }
  .sched-item.meal  { background: #faf8f4; border-left: 3px solid var(--border); }
  .sched-item.drive { background: #f8f8fc; border-left: 3px solid #b0b8d4; }
  .sched-item.checkin { background: #f8faf8; border-left: 3px solid var(--sage); }
  .sched-item.alt-route { background: #fdf8f0; border-left: 3px solid #e67e22; }
  .sched-icon { font-size: 14px; flex-shrink: 0; margin-top: 1px; }
  .sched-text { flex: 1; line-height: 1.5; color: #2a2a3e; }
  .sched-text strong { font-weight: 600; color: var(--ink); }
  .sched-badge { font-size: 9px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; padding: 2px 6px; border-radius: 2px; flex-shrink: 0; margin-top: 2px; }
  .badge-wow  { background: var(--gold); color: white; }
  .badge-hike { background: #4a7c2f; color: white; }
  .day-footer-stats { background: #f8f5ef; border-top: 1px solid var(--border); padding: 8px 16px; display: flex; gap: 20px; flex-wrap: wrap; }
  .day-footer-stat { font-size: 11px; color: #666; }
  .day-footer-stat strong { color: var(--ink); font-weight: 500; }
  .sec-heading { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--slate); margin-bottom: 6px; margin-top: 14px; padding: 0 14px; }
  .booking-tag { display: inline-flex; align-items: center; gap: 6px; font-size: 11px; background: rgba(107,143,113,0.12); color: var(--sage); border: 1px solid rgba(107,143,113,0.3); padding: 4px 10px; border-radius: 2px; margin-top: 8px; margin-right: 6px; }
  .laundry-tag { display: inline-flex; align-items: center; gap: 6px; font-size: 11px; background: rgba(201,168,76,0.1); color: #8a6e1a; border: 1px solid rgba(201,168,76,0.3); padding: 4px 10px; border-radius: 2px; margin-top: 6px; margin-right: 6px; }
  .alarm-tag { display: inline-flex; align-items: center; gap: 6px; font-size: 11px; background: rgba(184,92,56,0.1); color: var(--rust); border: 1px solid rgba(184,92,56,0.3); padding: 4px 10px; border-radius: 2px; margin-top: 6px; margin-right: 6px; }
  .birthday-banner { background: linear-gradient(135deg,#2d5016,#1a3a0a); color: #d4e8c2; padding: 8px 16px; font-size: 12px; font-weight: 500; letter-spacing: 1px; text-align: center; }

  /* CHECKLIST */
  .checklist { display: flex; flex-direction: column; gap: 1px; margin-top: 8px; }
  .check-item { display: flex; align-items: center; gap: 14px; padding: 12px 16px; background: white; border: 1px solid var(--border); border-radius: 2px; font-size: 13px; }
  .check-icon { width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; flex-shrink: 0; }
  .check-icon.done    { background: var(--sage);  color: white; }
  .check-icon.urgent  { background: var(--rust);  color: white; }
  .check-icon.pending { background: var(--gold);  color: white; }
  .check-main { flex: 1; font-weight: 500; }
  .check-deadline { font-size: 11px; color: var(--slate); }
  .check-status-done    { font-size: 11px; color: var(--sage); font-weight: 500; }
  .check-status-pending { font-size: 11px; color: #92400e; }
  .check-status-urgent  { font-size: 11px; color: var(--rust); font-weight: 600; }
  .check-link { font-size: 11px; color: var(--slate); text-decoration: none; }
  .check-link:hover { color: var(--ink); }

  /* BUDGET */
  .budget-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; margin-top: 8px; }
  .budget-item { background: white; border: 1px solid var(--border); border-radius: 4px; padding: 16px; }
  .budget-cat { font-size: 11px; letter-spacing: 1px; text-transform: uppercase; color: var(--slate); margin-bottom: 6px; }
  .budget-range { font-family: 'Playfair Display', serif; font-size: 20px; color: var(--ink); }
  .budget-total { grid-column: 1 / -1; background: var(--ink); color: var(--cream); border-color: var(--ink); }
  .budget-total .budget-cat { color: var(--gold-light); }
  .budget-total .budget-range { color: var(--gold-light); font-size: 28px; }

  /* CASH */
  .cash-table { width: 100%; border-collapse: collapse; margin-top: 8px; }
  .cash-table th { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--slate); font-weight: 500; text-align: left; padding: 8px 12px; border-bottom: 2px solid var(--border); }
  .cash-table td { padding: 10px 12px; border-bottom: 1px solid var(--border); font-size: 13px; }
  .cash-table tr:hover td { background: var(--warm); }
  .cash-amount { font-weight: 600; color: var(--ink); }

  /* REMINDERS */
  .reminders-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 12px; margin-top: 8px; }
  .reminder-item { background: white; border: 1px solid var(--border); border-radius: 4px; padding: 16px; font-size: 13px; display: flex; gap: 10px; align-items: flex-start; }
  .reminder-icon { font-size: 18px; flex-shrink: 0; margin-top: 1px; }

  /* SUMMARY / GLANCE TABLE — 8 columns */
  .glance-table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 900px; }
  .glance-table th { background: var(--ink); color: var(--gold-light); text-transform: uppercase; letter-spacing: 0.5px; padding: 12px 16px; text-align: left; white-space: nowrap; font-size: 10px; }
  .glance-table td { padding: 10px 16px; border-bottom: 1px solid var(--border); vertical-align: top; }
  .glance-table tr:nth-child(odd) td  { background: var(--warm); }
  .glance-table tr:nth-child(even) td { background: white; }
  .glance-table tr:hover td { background: #f0f7f1; }
  .g-day  { font-family: 'Playfair Display', serif; font-weight: 700; color: var(--ink); white-space: nowrap; font-size: 15px; vertical-align: middle !important; min-width: 50px; }
  .g-date { white-space: nowrap; color: var(--slate); font-size: 11px; vertical-align: middle !important; min-width: 70px; }
  .g-from { font-size: 11px; white-space: normal; vertical-align: middle !important; min-width: 90px; max-width: 120px; }
  .g-stay { font-size: 11px; color: var(--slate); white-space: normal; vertical-align: middle !important; min-width: 110px; max-width: 150px; }
  .g-drive { text-align: center; font-size: 12px; white-space: nowrap; font-weight: 500; vertical-align: middle !important; min-width: 130px; }
  .g-time  { text-align: center; font-size: 11px; color: var(--slate); white-space: nowrap; vertical-align: middle !important; min-width: 110px; }
  .g-bookings { font-size: 11px; line-height: 1.9; min-width: 200px; white-space: normal; }
  .g-map { text-align: center; vertical-align: middle !important; white-space: nowrap; min-width: 80px; }
  .g-map a { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; color: var(--slate); text-decoration: none; border: 1px solid var(--border); padding: 5px 12px; border-radius: 2px; transition: all 0.15s; white-space: nowrap; }
  .g-map a:hover { background: var(--ink); color: var(--cream); border-color: var(--ink); }
  /* Highlight pills */
  .g-highlights { min-width: 300px; max-width: 420px; padding-top: 10px !important; padding-bottom: 10px !important; }
  .hl-pills { display: flex; flex-wrap: wrap; gap: 4px; transition: background 0.2s; }
  .hl-pill { display: inline-block; background: rgba(201,168,76,0.12); color: #6b5010; border: 1px solid rgba(201,168,76,0.3); border-radius: 20px; padding: 3px 10px; font-size: 10px; font-weight: 500; white-space: nowrap; letter-spacing: 0.2px; transition: opacity 0.15s, transform 0.15s, border-color 0.3s, background 0.3s; }
  /* Draggable pill */
  .hl-pill[draggable="true"] { cursor: grab; }
  .hl-pill[draggable="true"]:active { cursor: grabbing; }
  .hl-pill--dragging { opacity: 0.35; transform: scale(0.92); }
  /* Drop target */
  .hl-pills--drag-active { min-height: 30px; }
  .hl-pills--drop-target { outline: 2px dashed var(--gold); outline-offset: 2px; background: rgba(201,168,76,0.06); border-radius: 4px; }
  /* Geographic warning on pill */
  .hl-pill--geo-warn { border-color: #c0392b !important; background: rgba(192,57,43,0.10) !important; color: #922 !important; animation: geoWarnPulse 0.6s ease; }
  @keyframes geoWarnPulse { 0%,100%{ box-shadow:none; } 50%{ box-shadow:0 0 0 4px rgba(192,57,43,0.18); } }
  /* Add highlight button */
  .hl-add-btn { display:inline-flex; align-items:center; justify-content:center; width:24px; height:22px; border:1.5px dashed rgba(201,168,76,0.4); border-radius:999px; background:transparent; color:var(--gold); font-size:15px; font-weight:bold; cursor:pointer; transition:all 0.2s; flex-shrink:0; line-height:1; padding:0; }
  .hl-add-btn:hover { background:rgba(201,168,76,0.12); border-color:var(--gold); }
  /* Inline add input */
  .hl-add-input { border:1.5px solid var(--gold); border-radius:999px; padding:2px 10px; font-size:10px; font-family:inherit; background:rgba(201,168,76,0.06); color:var(--ink); outline:none; min-width:110px; max-width:180px; height:22px; }
  .hl-add-input:focus { box-shadow:0 0 0 2px rgba(201,168,76,0.2); }
  /* Fade-in animation */
  .hl-pill--just-added { animation: hlFadeIn 0.3s ease; }
  @keyframes hlFadeIn { from{opacity:0;transform:translateX(-6px)} to{opacity:1;transform:translateX(0)} }
  /* Toast */
  .hl-toast { position:fixed; top:20px; left:50%; transform:translateX(-50%); background:var(--ink); color:#fff; padding:12px 22px; border-radius:8px; font-size:13px; box-shadow:0 4px 24px rgba(0,0,0,0.3); z-index:9999; animation:toastIn 0.3s ease; display:flex; align-items:center; gap:12px; max-width:600px; }
  .hl-toast a { color:var(--gold-light); cursor:pointer; text-decoration:underline; font-weight:500; white-space:nowrap; }
  @keyframes toastIn { from{opacity:0;transform:translateX(-50%) translateY(-12px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }
  /* Toolbar buttons */
  .hl-ctrl-btn { padding:5px 14px; border:1px solid var(--border); border-radius:4px; background:white; color:var(--slate); font-size:11px; cursor:pointer; transition:all 0.15s; font-family:inherit; letter-spacing:0.3px; }
  .hl-ctrl-btn:hover { background:var(--warm); color:var(--ink); border-color:var(--gold); }
  .bk-done    { color: #27ae60; font-weight: 600; font-size: 11px; }
  .bk-pending { color: #e67e22; font-weight: 600; font-size: 11px; }
  .g-action { min-width: 120px; vertical-align: middle !important; }
  .act-ok   { display:inline-block; font-size:10px; font-weight:600; padding:3px 8px; border-radius:20px; background:#eaf3de; color:#3b6d11; white-space:nowrap; }
  .act-pend { display:inline-block; font-size:10px; font-weight:600; padding:3px 8px; border-radius:20px; background:#faeeda; color:#854f0b; white-space:nowrap; }
  .act-red  { display:inline-block; font-size:10px; font-weight:600; padding:3px 8px; border-radius:20px; background:#fcebeb; color:#a32d2d; white-space:nowrap; }
  .export-bar { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
  .export-bar-title { font-family:'Playfair Display',serif; font-size:11px; letter-spacing:4px; text-transform:uppercase; color:var(--gold); display:flex; align-items:center; gap:12px; }
  .export-bar-title::after { content:''; flex:1; height:1px; background:var(--border); }
  .btn-export { display:inline-flex; align-items:center; gap:7px; background:var(--ink); color:var(--cream); border:none; border-radius:3px; padding:8px 16px; font-size:12px; font-weight:500; letter-spacing:0.5px; cursor:pointer; font-family:'DM Sans',sans-serif; transition:opacity 0.15s; white-space:nowrap; flex-shrink:0; }
  .btn-export:hover { opacity:0.82; }
  .btn-export svg { width:14px; height:14px; fill:currentColor; flex-shrink:0; }

  /* PDF button in hero */
  .btn-pdf { display:inline-flex; align-items:center; gap:8px; background:transparent; color:rgba(250,248,243,0.75); border:1px solid rgba(250,248,243,0.3); border-radius:3px; padding:9px 20px; font-size:12px; font-weight:500; letter-spacing:1px; text-transform:uppercase; cursor:pointer; font-family:'DM Sans',sans-serif; transition:all 0.2s; margin-top:28px; }
  .btn-pdf:hover { background:rgba(250,248,243,0.1); color:var(--cream); border-color:rgba(250,248,243,0.6); }
  .btn-pdf svg { width:15px; height:15px; fill:currentColor; flex-shrink:0; }

  /* ── PRINT / PDF STYLES ── */
  @media print {
    * { -webkit-print-color-adjust: exact; print-color-adjust: exact; box-sizing: border-box; }
    @page { margin: 12mm 10mm; size: A4; }
    nav, .btn-pdf, .btn-export, .hl-ctrl-btn, .hl-add-btn, .booking-strip,
    .export-bar, [class*="reset"], .item-cb, .day-toggle, .day-map-row,
    .pdf-bar, .trip-maps-grid, footer { display:none !important; }
    body { background:#fff; font-size:9.5px; line-height:1.45; color:#111; font-family:Arial,sans-serif; }
    a { color:inherit; text-decoration:none; }
    a[href]:after { content:""; }
    .hero { padding:16px 20px 12px; page-break-after:always; background:#1a1a2e !important; color:#fff !important; }
    .hero h1 { font-size:20px; margin-bottom:6px; }
    .hero-stats { gap:16px; margin-top:12px; }
    .stat-num { font-size:18px; }
    .container { padding:0; max-width:100%; }
    .section-title { margin-top:14px; margin-bottom:6px; font-size:8.5px; letter-spacing:2.5px; }
    .days-grid { display:block; }
    .day-card { margin-bottom:0; border:1px solid #ccc; break-inside:avoid; page-break-after:auto; }
    .day-body { display:block !important; }
    .day-header { background:#1a1a2e !important; color:#fff !important; padding:7px 10px; grid-template-columns:52px 1fr auto; gap:8px; }
    .day-num { font-size:16px !important; color:#c9a84c !important; }
    .day-date-small { font-size:8px; }
    .day-title { font-size:10px; font-weight:700; }

<script>
// ─── DATA SOURCE ────────────────────────────────────────────────────────────
const DATA_FILE = '../data/europe-2026.json?v=20260612215928';

// ─── EDITABLE HIGHLIGHTS — data layer ───────────────────────────────────────
const STORAGE_KEY = 'trip-highlights-europe-2026';
function getVersionedKey(d) {
  const v = (d.meta && d.meta._updated) ? d.meta._updated.slice(0,10) : 'v1';
  return STORAGE_KEY + '-' + v;
}
let editableGlance = [];   // mutable copy with _highlights arrays
let originalGlanceRef = null; // reference to original JSON data object
let glanceContainer = null;   // DOM reference for re-rendering

function loadGlance(original) {
  const key = getVersionedKey(window._tripData || {});
  // Clear all older version keys
  Object.keys(localStorage).filter(k => k.startsWith(STORAGE_KEY) && k !== key)
    .forEach(k => localStorage.removeItem(k));
  const saved = localStorage.getItem(key);
  if (saved) {
    try { return JSON.parse(saved); } catch(e) { localStorage.removeItem(key); }
  }
  return JSON.parse(JSON.stringify(original));
}
function saveGlance() {
  const key = getVersionedKey(window._tripData || {});
  const cleaned = editableGlance.map(({_highlights, ...rest}) => ({...rest, highlights: _highlights.join(' · ')}));
  localStorage.setItem(key, JSON.stringify(cleaned));
}
function resetGlance() {
  const key = getVersionedKey(window._tripData || {});
  localStorage.removeItem(key);
  initEditableGlance(originalGlanceRef);
}
function initEditableGlance(glanceArr) {
  editableGlance = loadGlance(glanceArr).map(g => ({
    ...g,
    _highlights: g.highlights ? g.highlights.split(' · ').map(s => s.trim()).filter(Boolean) : []
  }));
}

// ─── GEOGRAPHIC LOOKUP ──────────────────────────────────────────────────────
const PLACE_GEO = {
  // Iceland
  'Kerið Crater':'IS','Geysir (Strokkur)':'IS','Urriðafoss':'IS','Seljalandsfoss':'IS',
  'Gljúfrabúi cave':'IS','Skógafoss':'IS','Reynisfjara black sand beach':'IS','Vík village':'IS',
  'Dyrhólaey arch + puffins':'IS','Fjaðrárgljúfur Canyon':'IS','Svínafellsjökull Glacier walk':'IS',
  'Jökulsárlón Glacier Lagoon':'IS','Diamond Beach':'IS','Reykjanes golden hour':'IS',
  // Switzerland
  'Lake Thun viewpoint':'CH','Spiez Castle':'CH','Oeschinensee 8:30am':'CH',
  'Grindelwald First gondola #238070 ✅':'CH','Cliff Walk':'CH','Bachalpsee hike':'CH',
  'Staubbach Falls':'CH','Lauterbrunnen valley walk':'CH','Trümmelbach Falls optional':'CH',
  'Rhine Falls':'CH','Schaffhausen old town':'CH',
  // Germany
  'Königssee electric boat':'DE','Obersee + Röthbach Waterfall':'DE','St. Bartholomä lunch':'DE',
  'Hintersee + Zauberwald Magic Forest':'DE','Jenner summit 1,874m':'DE',
  "Eagle's Nest 1,834m":'DE',
  // Austria
  'Liechtensteinklamm 444 stairs + 50m waterfall':'AT','Salzburg old town':'AT',
  'Hohensalzburg Fortress interior':'AT','Wolfgangsee':'AT','Hallstatt golden hour':'AT',
  'Gosausee glacier lake loop':'AT','Hallstatt Salt Mine':'AT','Skywalk':'AT',
  'Beinhaus 1,200 skulls':'AT','Echern Valley + Waldbachstrub':'AT',
  'Dachstein 5 Fingers 2,109m':'AT','lakefront golden hour':'AT',
  'Grossglockner High Alpine Road':'AT','Fuscher Törl':'AT','Edelweißspitze 2,571m':'AT',
  'Kaiser-Franz-Josefs-Höhe':'AT','Pasterze Glacier':'AT',
  'Villgratental valley walk':'AT','Außervillgraten village':'AT',
  'optional Thurntaler road lunch preview':'AT','rest day':'AT',
  'Thurntaler 2,407m summit':'AT','Tre Cime view from Austrian side':'AT',
  'Seebensee lake':'AT','Drachensee Dragon Lake':'AT','Coburger Hütte':'AT',
  // Italy
  'Seceda cable car':'IT','Fermeda Towers ridgeline':'IT','Val di Funes':'IT',
  'Santa Maddalena':'IT','Lagazuoi WWI → Dobbiaco':'IT',
  'Lago di Braies 6am sunrise':'IT','Cadini di Misurina viewpoint':'IT',
  'Tre Cime loop 6.2mi':'IT','Rifugio Locatelli':'IT',
  'Goodbye Dolomites':'IT','Olpererhütte hike':'IT','Kebema suspension bridge':'IT',
  'Giant Swing':'IT','Mayrhofen overnight':'AT',
  // Liechtenstein
  'Vaduz':'LI',
};

const FLAG_TO_ISO = {'🇮🇸':'IS','🇨🇭':'CH','🇩🇪':'DE','🇦🇹':'AT','🇮🇹':'IT','🇱🇮':'LI'};

function getDayCountries(dayEntry) {
  const codes = new Set();
  const flagRe = /[\u{1F1E0}-\u{1F1FF}]{2}/gu;
  [dayEntry.flag, dayEntry.from, dayEntry.nightStay].forEach(str => {
    if (!str) return;
    const matches = str.match(flagRe);
    if (matches) matches.forEach(f => { if (FLAG_TO_ISO[f]) codes.add(FLAG_TO_ISO[f]); });
  });
  if (codes.size === 0 && dayEntry.flag) {
    const f = dayEntry.flag.trim();
    if (FLAG_TO_ISO[f]) codes.add(FLAG_TO_ISO[f]);
  }
  return [...codes];
}

function isGeoMismatch(place, dayEntry) {
  const placeCountry = PLACE_GEO[place];
  if (!placeCountry) return false; // unknown place → no warning
  const dayCountries = getDayCountries(dayEntry);
  return dayCountries.length > 0 && !dayCountries.includes(placeCountry);
}

// ─── DRAG & DROP STATE ──────────────────────────────────────────────────────
let dragState = { sourceDayIdx: null, place: null, pillIdx: null };

function onPillDragStart(e) {
  const pill = e.currentTarget;
  dragState.sourceDayIdx = parseInt(pill.dataset.dayIndex);
  dragState.place = pill.dataset.place;
  dragState.pillIdx = parseInt(pill.dataset.pillIndex);
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', pill.dataset.place);
  pill.classList.add('hl-pill--dragging');
  document.querySelectorAll('.hl-pills').forEach(el => el.classList.add('hl-pills--drag-active'));
}
function onPillDragEnd(e) {
  e.currentTarget.classList.remove('hl-pill--dragging');
  document.querySelectorAll('.hl-pills').forEach(el => {
    el.classList.remove('hl-pills--drag-active','hl-pills--drop-target');
  });
  dragState = { sourceDayIdx: null, place: null, pillIdx: null };
}
function onPillDragOver(e) { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; }
function onPillDragEnter(e) { e.preventDefault(); e.currentTarget.classList.add('hl-pills--drop-target'); }
function onPillDragLeave(e) {
  if (!e.currentTarget.contains(e.relatedTarget)) e.currentTarget.classList.remove('hl-pills--drop-target');
}
function onPillDrop(e) {
  e.preventDefault();
  e.currentTarget.classList.remove('hl-pills--drop-target');
  const targetIdx = parseInt(e.currentTarget.dataset.dayIndex);
  const { sourceDayIdx, place, pillIdx } = dragState;
  if (sourceDayIdx === null || place === null || sourceDayIdx === targetIdx) return;

  editableGlance[sourceDayIdx]._highlights.splice(pillIdx, 1);
  editableGlance[targetIdx]._highlights.push(place);
  saveGlance();

  const mismatch = isGeoMismatch(place, editableGlance[targetIdx]);
  rerenderGlanceTable();

  if (mismatch) showGeoWarning(place, sourceDayIdx, targetIdx);
}

// ─── ADD HIGHLIGHT ──────────────────────────────────────────────────────────
function onAddHighlightClick(e) {
  const btn = e.currentTarget;
  const dayIdx = parseInt(btn.dataset.dayIndex);
  const parent = btn.parentElement;
  const input = document.createElement('input');
  input.className = 'hl-add-input';
  input.placeholder = 'Add place…';
  input.type = 'text';
  parent.replaceChild(input, btn);
  input.focus();

  let committed = false;
  function commit() {
    if (committed) return;
    committed = true;
    const val = input.value.trim();
    if (val) {
      editableGlance[dayIdx]._highlights.push(val);
      saveGlance();
    }
    rerenderGlanceTable();
  }
  input.addEventListener('keydown', ev => {
    if (ev.key === 'Enter') { ev.preventDefault(); commit(); }
    if (ev.key === 'Escape') { committed = true; rerenderGlanceTable(); }
  });
  input.addEventListener('blur', commit);
}

// ─── TOAST WARNING ──────────────────────────────────────────────────────────
function showGeoWarning(place, srcIdx, tgtIdx) {
  const srcDay = editableGlance[srcIdx];
  const tgtDay = editableGlance[tgtIdx];
  const placeCountry = PLACE_GEO[place] || '??';
  const tgtCountries = getDayCountries(tgtDay).join('/') || '??';

  // Mark the moved pill with geo-warn class
  document.querySelectorAll('.hl-pills').forEach(container => {
    if (parseInt(container.dataset.dayIndex) === tgtIdx) {
      const pills = container.querySelectorAll('.hl-pill');
      pills.forEach(p => { if (p.dataset.place === place) p.classList.add('hl-pill--geo-warn'); });
    }
  });

  const toast = document.createElement('div');
  toast.className = 'hl-toast';
  toast.innerHTML = '<span>⚠️ Moved "<strong>' + place + '</strong>" to Day ' + tgtDay.day +
    ' — place is in ' + placeCountry + ', but Day ' + tgtDay.day + ' is in ' + tgtCountries + '</span>' +
    '<a class="hl-toast-undo">Undo</a>';
  document.body.appendChild(toast);

  toast.querySelector('.hl-toast-undo').addEventListener('click', () => {
    const idx = editableGlance[tgtIdx]._highlights.indexOf(place);
    if (idx !== -1) editableGlance[tgtIdx]._highlights.splice(idx, 1);
    editableGlance[srcIdx]._highlights.push(place);
    saveGlance();
    rerenderGlanceTable();
    toast.remove();
  });
  setTimeout(() => { if (toast.parentNode) toast.remove(); }, 6000);
}

// ─── RE-RENDER ──────────────────────────────────────────────────────────────
function rerenderGlanceTable() {
  if (!glanceContainer || !originalGlanceRef) return;
  const parent = glanceContainer.parentElement;
  const newEl = renderSummaryTable({glance: originalGlanceRef, checklist: window._tripChecklist, accommodation: window._tripAccommodation});
  parent.replaceChild(newEl, glanceContainer);
  glanceContainer = newEl;
}

// ─── HELPERS ────────────────────────────────────────────────────────────────
const h = (tag, attrs, ...children) => {
  const el = document.createElement(tag);
  if (attrs) Object.entries(attrs).forEach(([k,v]) => {
    if (k === 'class') el.className = v;
    else if (k === 'html') el.innerHTML = v;
    else if (k.startsWith('on')) el.addEventListener(k.slice(2), v);
    else el.setAttribute(k, v);
  });
  children.flat().forEach(c => c && el.appendChild(typeof c === 'string' ? document.createTextNode(c) : c));
  return el;
};
const div  = (cls, ...c) => h('div', {class: cls}, ...c);
const span = (cls, txt) => h('span', {class: cls, html: txt});
const p    = (cls, txt) => h('p', {class: cls, html: txt});

function tagEl(tag) {
  const cls = { booking: 'booking-tag', laundry: 'laundry-tag', alarm: 'alarm-tag' }[tag.type] || 'alarm-tag';
  return h('span', {class: cls, html: tag.text});
}

  var DAY='FF1E3A5F', TL='FF0F2544', KD='FFFEF3C7', TIP='FFEFF6FF';

  var TYPE_LBL={DRIVE:'Drive',HIKE:'Hike',MEAL:'Eat',HOTEL:'Stay',WARN:'ALERT',STOP:'Stop'};

    var s = {

      alignment:{horizontal:halign||'left',vertical:'top',wrapText:(wrap!==false)},

// Classify an item text into a schedule row type
function classifyItem(text) {
  const t = text.toLowerCase();
  if (t.includes('check in') || t.includes('check-in') || t.includes('night at') || t.includes('night —') || t.includes('✅')) return 'checkin';
  if (t.includes('lunch') || t.includes('dinner') || t.includes('breakfast') || t.includes('fondue') || t.includes('meal') || t.includes('eat')) return 'meal';
  if (t.includes('⭐') || t.includes('plan a') || t.includes('plan b') || t.includes('optional')) {
    if (t.includes('backup')) return 'alt-route';
    return 'wow';
  }
  if (t.includes('hike') || t.includes('walk') || t.includes('trail') || t.includes('summit') || t.includes('gorge') || t.includes('climb') || t.includes('loop') || t.includes('ascent') || t.includes('gondola') || t.includes('cable car') || t.includes('trek')) return 'hike';
  if (t.includes('drive') || t.includes('fly') || t.includes('flight') || t.includes('board') || t.includes('depart') || t.includes('leave') || t.includes('→') || t.includes('pick up car') || t.includes('return') && t.includes('car')) return 'drive';
  return '';
}

function iconForType(type, text) {
  const t = text.toLowerCase();
  if (type === 'checkin') return '🏠';
  if (type === 'meal') {
    if (t.includes('lunch')) return '🍽';
    if (t.includes('dinner')) return '🍽';
    return '🍽';
  }
  if (type === 'wow') return '⭐';
  if (type === 'alt-route') return '⚠️';
  if (type === 'hike') return '🥾';
  if (type === 'drive') {
    if (t.includes('fly') || t.includes('flight') || t.includes('board')) return '✈️';
    return '🚗';
  }
  return '•';
}

      pr.appendChild(h('strong',{},spot.name));

      if(spot.note) pr.appendChild(h('span',{style:'color:#888;font-size:10px;'},'Â· '+spot.note));
      psW.appendChild(pr);
    });
    body.appendChild(psW);
  }

  // Key Decisions block
  if (day.keyDecisions && day.keyDecisions.length) {
    const kd = div('key-decisions');
    kd.appendChild(h('div', {class:'key-decisions-title'}, '⚡ Key Decisions'));
    const ul = h('ul');
    day.keyDecisions.forEach(dec => ul.appendChild(h('li', {html: dec})));
    kd.appendChild(ul);
    body.appendChild(kd);
  }

  // Map links row
  if (day.mapLinks && day.mapLinks.length) {
    const mapRow = div('day-map-row');
    day.mapLinks.forEach(ml => mapRow.appendChild(
      h('a', {class:'day-map-link', href:ml.url, target:'_blank', rel:'noopener'}, '📍 ' + ml.label)
    ));
    body.appendChild(mapRow);
  }

  // Build all schedule items + collect compact chips
  const grid = div('sched-grid');
  const compactItems = []; // {icon, label, chipClass}

  function stripHtmlForChip(html) {
    return html.replace(/<[^>]+>/g,'').replace(/\s+/g,' ').trim();
  }
  function shortLabel(text, type) {
    // Extract the bold part (between first <strong>…</strong>) as the chip label
    const m = text.match(/<strong>([^<]+)<\/strong>/);
    if (m) {
      // Trim time prefix like "8:30am — " from the label
      return m[1].replace(/^\d+:\d+[ap]m\s*[—–-]\s*/i,'').substring(0,34);
    }
    return stripHtmlForChip(text).substring(0,34);
  }

  day.sections.forEach(sec => {
    if (sec.heading && day.sections.length > 1) {
      const headingEl = h('div', {style:'grid-column:1/-1;', class:'sec-heading'}, sec.heading);
      grid.appendChild(headingEl);
    }
    sec.items.forEach(item => {
      const type = classifyItem(item);
      const icon = iconForType(type, item);
      const timeCell = h('div', {class:'sched-time'}, '');
      const itemCell = h('div', {class:'sched-item' + (type ? ' ' + type : '')});
      // Checkbox for done/not-done
      const cbKey = 'item-done-' + day.date + '-' + idx + '-' + sec.items.indexOf(item);
      const cb = document.createElement('input');
      cb.type = 'checkbox';
      cb.className = 'item-cb';
      cb.checked = localStorage.getItem(cbKey) === '1';
      if (cb.checked) itemCell.classList.add('item-done');
      cb.addEventListener('change', function() {
        if (cb.checked) { localStorage.setItem(cbKey, '1'); itemCell.classList.add('item-done'); }
        else { localStorage.removeItem(cbKey); itemCell.classList.remove('item-done'); }
      });
      itemCell.appendChild(cb);
      itemCell.appendChild(h('span', {class:'sched-icon'}, icon));
      const textEl = h('span', {class:'sched-text', html: item});
      itemCell.appendChild(textEl);
      if (type === 'wow') {
        const isMust = item.includes('⭐ ⭐') || (item.includes('WOW') && !item.includes('Optional') && !item.includes('optional'));
        if (isMust) {
          itemCell.appendChild(h('span', {class:'sched-badge badge-must'}, 'MUST'));
        } else {
          itemCell.appendChild(h('span', {class:'sched-badge badge-wow'}, 'WOW'));
        }
      }
      if (type === 'hike') itemCell.appendChild(h('span', {class:'sched-badge badge-hike'}, 'HIKE'));
      grid.appendChild(timeCell);
      grid.appendChild(itemCell);

      // Collect chips for compact strip — only meaningful types
      if (['wow','hike','drive','meal','checkin'].includes(type)) {
        const chipClass = type === 'checkin' ? 'chip-stay' : 'chip-' + type;
        compactItems.push({ icon, label: shortLabel(item, type), chipClass });
      }
    });
  });

  // Compact strip — shown on mobile before full detail
  if (compactItems.length) {
    const strip = div('day-compact-strip');
    compactItems.slice(0,8).forEach(ci => {
      strip.appendChild(h('span', {class:'compact-chip ' + ci.chipClass}, ci.icon + ' ' + ci.label));
    });
    body.appendChild(strip);
  }

  // Full detail wrapper — collapsible on mobile
  const fullDetail = div('day-full-detail');
  fullDetail.appendChild(grid);
  body.appendChild(fullDetail);

  // Toggle button (only visible on mobile via CSS)
  const dtBtn = h('button', {class:'day-detail-toggle'}, '📋 Full Schedule', h('span',{class:'dtoggle-arrow'},'▾'));
  dtBtn.addEventListener('click', function() {
    const open = fullDetail.classList.toggle('detail-open');
    dtBtn.classList.toggle('expanded', open);
    dtBtn.childNodes[0].textContent = open ? '📋 Collapse ' : '📋 Full Schedule ';
  });
  body.appendChild(dtBtn);

  // Tags row
  if (day.tags && day.tags.length) {
    const tagWrap = h('div', {style:'padding:10px 14px 12px;display:flex;flex-wrap:wrap;gap:6px;background:#fafaf8;border-top:1px solid var(--border);'});
    day.tags.forEach(t => tagWrap.appendChild(tagEl(t)));
    body.appendChild(tagWrap);
  }

  // Footer stats from summary
  if (day.summary) {
    const s = day.summary;
    const stats = [];
    if (s.drive && s.drive !== '—') stats.push(['Drive', s.drive]);
    if (s.highlights) stats.push(['Highlights', s.highlights.split(' · ').slice(0,3).join(' · ')]);
    if (stats.length) {
      const footer = div('day-footer-stats');
      stats.forEach(([k,v]) => {
        const st = div('day-footer-stat');
        st.innerHTML = '<strong>' + k + ':</strong> ' + v;
        footer.appendChild(st);
      });
      body.appendChild(footer);
    }
  }

  card.appendChild(body);
  return card;
}
